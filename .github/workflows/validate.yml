name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run setup
        run: bash setup.sh

      - name: Check sod outputs
        run: bash scripts/update-sod-report.sh --check

      - name: Check dust outputs
        run: bash scripts/build-dust.sh --check

      - name: Run hook tests
        run: bash tests/test-spec-gate.sh

      - name: Run workflow script tests
        run: bash tests/test-workflow-scripts.sh
