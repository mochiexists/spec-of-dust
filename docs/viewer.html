<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spec-of-dust &middot; log viewer</title>
    <style>
      :root {
        --bg: #f4efe6;
        --fg: #1d1a17;
        --muted: #5c544c;
        --line: #cdbfaf;
        --card: #fffaf2;
        --accent: #8c4f2f;
        --smooth: #4a7c59;
        --rough: #b5762a;
        --blocked: #a93e2f;
        --devlog-border: #b8a48e;
        --flowlog-border: var(--accent);
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, #fff7ec 0, transparent 35%),
          linear-gradient(180deg, #f7f1e8 0%, var(--bg) 100%);
        color: var(--fg);
        min-height: 100vh;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 600;
        letter-spacing: 0.02em;
        margin-bottom: 6px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.5;
        margin-bottom: 32px;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .filter-btn {
        font-family: inherit;
        font-size: 0.88rem;
        padding: 6px 14px;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--fg);
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-btn:hover { border-color: var(--accent); }

      .filter-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .entry-count {
        margin-left: auto;
        font-size: 0.85rem;
        color: var(--muted);
        font-style: italic;
      }

      .timeline {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .entry {
        border: 1px solid var(--line);
        background: var(--card);
        padding: 20px 22px;
      }

      .entry.devlog { border-left: 4px solid var(--devlog-border); }
      .entry.flowlog { border-left: 4px solid var(--flowlog-border); }

      .entry-header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .entry-ts {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .entry-source {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 8px;
        border: 1px solid var(--line);
        color: var(--muted);
      }

      .entry-agent {
        font-size: 0.82rem;
        color: var(--accent);
        font-weight: 600;
      }

      .entry-change {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--fg);
        margin-bottom: 6px;
      }

      .badge {
        display: inline-block;
        font-size: 0.75rem;
        font-family: "SF Mono", "Fira Code", monospace;
        padding: 2px 10px;
        border-radius: 3px;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .badge.smooth {
        background: rgba(74, 124, 89, 0.12);
        color: var(--smooth);
        border: 1px solid rgba(74, 124, 89, 0.3);
      }

      .badge.rough {
        background: rgba(181, 118, 42, 0.12);
        color: var(--rough);
        border: 1px solid rgba(181, 118, 42, 0.3);
      }

      .badge.blocked {
        background: rgba(169, 62, 47, 0.12);
        color: var(--blocked);
        border: 1px solid rgba(169, 62, 47, 0.3);
      }

      .badge.kind {
        background: rgba(140, 79, 47, 0.08);
        color: var(--accent);
        border: 1px solid rgba(140, 79, 47, 0.2);
      }

      .entry-fields {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 16px;
        font-size: 0.9rem;
        line-height: 1.5;
        margin-top: 10px;
      }

      .field-label {
        color: var(--muted);
        font-size: 0.82rem;
        text-align: right;
        padding-top: 1px;
      }

      .field-value { word-break: break-word; }
      .field-value.empty { color: var(--line); font-style: italic; }

      details.entry-details summary {
        font-size: 0.85rem;
        color: var(--muted);
        cursor: pointer;
        margin-top: 10px;
        padding: 4px 0;
        user-select: none;
      }

      details.entry-details summary:hover { color: var(--accent); }
      details .detail-content { margin-top: 8px; }

      .entry.change { border-left: 4px solid var(--accent); }

      .dust-line {
        font-style: italic;
        color: var(--accent);
        font-size: 1.1rem;
        line-height: 1.5;
        padding: 12px 0 4px;
        border-top: 1px solid var(--line);
        margin-top: 12px;
      }

      .dust-line::before {
        content: "\u2756 ";
        opacity: 0.5;
      }

      .status-badge {
        font-size: 0.75rem;
        font-family: "SF Mono", "Fira Code", monospace;
        padding: 2px 10px;
        border-radius: 3px;
        font-weight: 600;
        letter-spacing: 0.03em;
        background: rgba(140, 79, 47, 0.08);
        color: var(--accent);
        border: 1px solid rgba(140, 79, 47, 0.2);
      }

      .status-badge.done {
        background: rgba(74, 124, 89, 0.12);
        color: var(--smooth);
        border: 1px solid rgba(74, 124, 89, 0.3);
      }

      .entry-what {
        font-size: 0.92rem;
        line-height: 1.5;
        color: var(--muted);
        margin-top: 6px;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .stats {
        display: flex;
        gap: 20px;
        padding: 14px 20px;
        background: var(--card);
        border: 1px solid var(--line);
        margin-bottom: 24px;
        font-size: 0.88rem;
        color: var(--muted);
        flex-wrap: wrap;
      }

      .stat-value {
        font-weight: 600;
        color: var(--fg);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>log viewer</h1>
      <p class="subtitle">
        Browse workflow logs from spec-of-dust.
      </p>

      <div id="app" style="display:none">
        <div class="stats" id="stats"></div>

        <div class="toolbar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="devlog">Devlog</button>
          <button class="filter-btn" data-filter="flowlog">Flowlog</button>
          <button class="filter-btn" data-filter="change">Changes</button>
          <span class="entry-count" id="entryCount"></span>
        </div>

        <div class="timeline" id="activeSection" style="display:none"></div>
        <div class="timeline" id="timeline"></div>
      </div>

      <div class="empty-state" id="emptyState" style="display:none">
        <p>No entries found in the loaded files.</p>
      </div>
    </main>

    <script>
      /* embedded-data:start */
      const EMBEDDED_DEVLOG = ["{\"ts\":\"2026-04-15T08:00:00Z\",\"event\":\"skip-no-verify\",\"kind\":\"comment\",\"summary\":\"Synthetic example skip entry\",\"reason\":\"Single-file docs tweak kept in-repo to show the JSONL shape\",\"files\":[\"README.md\"],\"command\":\"git commit --no-verify\"}","{\"ts\":\"2026-04-16T09:33:12Z\",\"event\":\"skip-no-verify\",\"kind\":\"one-line-fix\",\"summary\":\"Auto-load JSONL from repo-relative paths in viewer\",\"reason\":\"Small JS addition to try fetching logs on page load, no design change\",\"files\":[\"docs/viewer.html\"],\"command\":\"git commit --no-verify\"}","{\"ts\":\"2026-04-16T11:44:32Z\",\"event\":\"skip-no-verify\",\"kind\":\"config-tweak\",\"summary\":\"Backdate undated archive files with 2026-04-14 prefix\",\"reason\":\"File renames only, no content changes — adds date prefix for viewer timeline ordering\",\"files\":[\".spec/archive\"],\"command\":\"git commit --no-verify\"}","{\"ts\":\"2026-04-16T21:27:13Z\",\"event\":\"skip-no-verify\",\"kind\":\"config-tweak\",\"summary\":\"Archive 15 completed changes for v0.1.0 release\",\"reason\":\"Release-time archive sweep — all changes are status:done and individually committed\",\"files\":[\".spec/archive\"],\"command\":\"git commit --no-verify\"}"];
      const EMBEDDED_FLOWLOG = ["{\"ts\":\"2026-04-16T18:00:00Z\",\"agent\":\"claude\",\"change\":\"add-workflow-feedback-log\",\"flow_divergence\":\"codex CLI syntax is `codex exec` not `codex -q` as documented in FLOW.md — had to discover this mid-review\",\"friction\":\"post-build review caught real issues but required a second build pass to fix blockers before verify\",\"suggestion\":\"add a bash helper for JSONL appends so agents don't hand-craft JSON\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T07:15:19Z\",\"agent\":\"claude\",\"change\":\"add-jsonl-append-helpers\",\"flow_divergence\":\"none\",\"friction\":\"Codex background task output was hard to parse — had to grep for the review verdict\",\"suggestion\":\"consider a structured output format for codex exec reviews\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T09:05:57Z\",\"agent\":\"claude\",\"change\":\"add-workflow-log-viewer\",\"flow_divergence\":\"none\",\"friction\":\"security hook required innerHTML refactor to DOM methods — good guard but added a build pass\",\"suggestion\":\"consider adding the viewer to the README root layout section\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T09:43:02Z\",\"agent\":\"claude\",\"change\":\"embed-jsonl-in-viewer\",\"flow_divergence\":\"none\",\"friction\":\"awk multiline vars and grep regex interpretation caused two debugging rounds\",\"suggestion\":\"add a viewer rebuild to the SOD refresh script so both stay in sync\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T11:12:03Z\",\"agent\":\"claude\",\"change\":\"embed-change-history-in-viewer\",\"flow_divergence\":\"committed a mid-build edit (drop zone removal) without updating the spec first — had to fold it back in\",\"friction\":\"bash markdown parsing is tedious but necessary for zero-dependency; Codex caught four real issues in the viewer rendering\",\"suggestion\":\"consider a workflow-discipline reminder when the agent edits files not mentioned in the current spec's acceptance criteria\",\"sentiment\":\"rough\"}","{\"ts\":\"2026-04-16T11:21:45Z\",\"agent\":\"claude\",\"change\":\"scope-aware-commit-gate\",\"flow_divergence\":\"none\",\"friction\":\"first test used an exempt file which silently passed — had to rethink what constitutes a real scope violation test\",\"suggestion\":\"exempt patterns should be documented more prominently so test authors know which files to avoid\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T12:27:26Z\",\"agent\":\"claude\",\"change\":\"condensation-review\",\"flow_divergence\":\"skipped Codex peer review — CLI stalled after reading files, proceeded without\",\"friction\":\"none — review-only spec, no code to wrestle with\",\"suggestion\":\"the viewer pipeline is the top condensation target\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T12:38:17Z\",\"agent\":\"claude\",\"change\":\"operational-context-budget\",\"flow_divergence\":\"none\",\"friction\":\"SOD script ordering matters — viewer rebuild can invalidate SOD after staging\",\"suggestion\":\"FLOW.md needs trimming to hit 3k bootstrap target\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T12:47:12Z\",\"agent\":\"claude\",\"change\":\"trim-bootstrap-context\",\"flow_divergence\":\"human-steered: added version bump and noted human guidance convention mid-build rather than creating new specs\",\"friction\":\"first FLOW.md rewrite dropped 4 rules — Codex caught all of them\",\"suggestion\":\"add a diff-based rule checker that verifies key phrases survive rewrites\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T13:13:19Z\",\"agent\":\"codex\",\"change\":\"full-repo-evaluation\",\"flow_divergence\":\"none\",\"friction\":\"peer-review CLI calls completed but were slow enough to look stalled, which makes the required review step feel brittle during review-only work\",\"suggestion\":\"document a timeout-and-proceed rule for peer reviews when the other CLI hangs or returns too slowly\",\"sentiment\":\"rough\"}","{\"ts\":\"2026-04-16T16:01:58Z\",\"agent\":\"codex\",\"change\":\"fix-setup-template-drift\",\"flow_divergence\":\"none\",\"friction\":\"parallel Claude spec reviews collided on temp-file handling, so the backlog review step had to fall back to sequential peer reviews\",\"suggestion\":\"document that cross-model reviews should run sequentially when the other CLI uses shared temp files\",\"sentiment\":\"rough\"}","{\"ts\":\"2026-04-16T16:02:32Z\",\"agent\":\"codex\",\"change\":\"fix-claude-review-command-drift\",\"flow_divergence\":\"none\",\"friction\":\"the fix was trivial once the source of truth was pinned to FLOW.md\",\"suggestion\":\"keep agent-specific files as thin adapters to FLOW.md so command drift has fewer places to survive\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T16:02:52Z\",\"agent\":\"codex\",\"change\":\"fix-viewer-archive-filename-parsing\",\"flow_divergence\":\"none\",\"friction\":\"verifying embedded viewer data took a little extra work because the generated HTML stores everything on one large line\",\"suggestion\":\"add a small repo-local check that parses EMBEDDED_CHANGES and asserts known archive timestamps so viewer regressions are easier to catch\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T17:20:41Z\",\"agent\":\"codex\",\"change\":\"require-commit-after-done\",\"flow_divergence\":\"none\",\"friction\":\"the first test pass exposed that closeout discipline depends on staged/index state as much as file contents, so the fixtures needed a second pass\",\"suggestion\":\"add more fixture helpers that model staged tracked-file additions before SOD refresh so closeout tests are less fragile\",\"sentiment\":\"rough\"}","{\"ts\":\"2026-04-16T19:02:08Z\",\"agent\":\"codex\",\"change\":\"validate-done-closeout-gate\",\"flow_divergence\":\"none\",\"friction\":\"the only wasted motion was a first reproduction run that used zsh's reserved status variable name\",\"suggestion\":\"keep using disposable repo fixtures for workflow validation so mistakes are reproducible without polluting the main checkout\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T22:20:13Z\",\"agent\":\"claude\",\"change\":\"fix-archive-commit-gate-bypass\",\"flow_divergence\":\"none\",\"friction\":\"first implementation was too broad — bypassed all gates instead of just the spec gate\",\"suggestion\":\"gate bypass functions should document exactly which gates they exempt\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T22:42:03Z\",\"agent\":\"claude\",\"change\":\"fix-sod-viewer-rebuild-loop\",\"flow_divergence\":\"none\",\"friction\":\"first test tested the wrong layer — called --check instead of the hook function\",\"suggestion\":\"none\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-16T23:38:50Z\",\"agent\":\"claude\",\"change\":\"create-language-packs\",\"flow_divergence\":\"none\",\"friction\":\"python-research self-containment vs line budget was the main tension\",\"suggestion\":\"none\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-17T00:47:56Z\",\"agent\":\"codex\",\"change\":\"fix-viewer-freshness-and-archive-utc\",\"flow_divergence\":\"\",\"friction\":\"Generated viewer and sod artifacts both needed refresh while the active change file was still moving during verify.\",\"suggestion\":\"Keep generated artifact ownership centralized in the archive path and explicit freshness checks in validation.\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-17T00:56:31Z\",\"agent\":\"codex\",\"change\":\"publish-dust-on-mochiexists\",\"flow_divergence\":\"\",\"friction\":\"sod needed a second refresh because the new docs file had to be staged before it counted toward the generated metrics.\",\"suggestion\":\"For docs-only additions, stage new tracked files before rerunning the sod generator.\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-17T01:10:05Z\",\"agent\":\"codex\",\"change\":\"distinguish-advisory-vs-live-delivery\",\"flow_divergence\":\"\",\"friction\":\"The main risk was over-designing a new advisory taxonomy when the real gap was simply missing external-target verification.\",\"suggestion\":\"When a user says they want something live, make the target and verification method explicit in the spec.\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-17T02:01:43Z\",\"agent\":\"codex\",\"change\":\"record-git-identity-and-publish-restrictions\",\"flow_divergence\":\"\",\"friction\":\"The main risk was over-specifying identity policy instead of just making publish authority explicit in specs and final reporting.\",\"suggestion\":\"For external-target work, record the expected account before attempting push or deploy.\",\"sentiment\":\"smooth\"}"];
      const EMBEDDED_CHANGES = ["{\"name\":\"add-agent-team-guidance\",\"status\":\"done\",\"ts\":\"2026-04-14T00:00:00Z\",\"what\":\"Add a minimal policy for optional agent-team usage in `spec-of-dust`. Define a simple text-based teaming preference so users can signal how much parallel team usage they want, document when parallel teams are appropriate, and keep the guidance usable for both Codex and Claude without making agent teams mandatory.\",\"dust\":\"\",\"challenges\":\"\",\"learnings\":\"\",\"outcomes\":\"\",\"peer_spec_review\":\"Summary for review: add a minimal `teams:` preference to `.spec/b-startup.md`, document when agent teams are useful in `.spec/FLOW.md`, and add one short note each in `CLAUDE.md` and `CODEX.md`.\\n\\nClaude review:\\n\\n- preference values needed to be explicit\\n- target files needed to be named\\n- default behavior when absent needed to be defined\\n- “does not materially bloat” needed a measurable budget\\n\\nValid feedback addressed:\\n\\n- values narrowed to `teams: none | some | many`\\n- target files narrowed to `.spec/b-startup.md`, `.spec/FLOW.md`, `CLAUDE.md`, and `CODEX.md`\\n- absent flag now defaults to `some`\\n- brevity now has explicit line budgets\",\"peer_code_review\":\"Claude review:\\n\\n- overall scope and symmetry were good\\n- `FLOW.md` had one redundant rules bullet repeating the agent-teams section\\n- `b-startup.md` needed to make it clearer that the user should set one live `teams:` value\\n- no correctness issues were found in the Codex/Claude guidance itself\\n\\nValid feedback addressed:\\n\\n- removed the redundant `teams:` rules bullet from `.spec/FLOW.md`\\n- clarified in `.spec/b-startup.md` that users should set one live value only\\n- `CODEX.md` provenance is an edit, not a new file\",\"verify\":\"- [x] `.spec/b-startup.md` defines one user-facing teaming flag with concrete values, a default behavior, and examples\\n  Verified by `teams: none | some | many`, default `some`, and single-value examples in `.spec/b-startup.md`\\n- [x] `.spec/FLOW.md` explains when agent teams are appropriate and when they are not\\n  Verified by the `## Agent teams` section in `.spec/FLOW.md`\\n- [x] `CLAUDE.md` and `CODEX.md` each mention the teaming preference in no more than two added bullets per file\\n  Verified by two teaming bullets in each file\\n- [x] The added guidance stays concise: no more than 8 net new lines in `.spec/b-startup.md`, and no more than 12 net new lines in each other touched file\\n  Verified by final line counts after trim: `.spec/b-startup.md` +5, `.spec/FLOW.md` +11, `CLAUDE.md` +1, `CODEX.md` +2\"}","{\"name\":\"add-feature-closure-summary\",\"status\":\"done\",\"ts\":\"2026-04-14T00:00:00Z\",\"what\":\"Add a small closure section to the standard change flow so completed features leave behind a concise summary of challenges, learnings, outcomes, and a short `Dust` note. This should stay lightweight, but it should give future agents and humans enough signal to understand what happened and what mattered after the work is done.\",\"dust\":\"Small rituals keep the machine human.\",\"challenges\":\"The first pass only captured delivery notes and missed peer-review plus verify takeaways, so the closure shape had to be widened.\",\"learnings\":\"If a closure gate is meant for future analysis, it needs explicit prompts; otherwise agents collapse categories or omit review signal.\",\"outcomes\":\"Standard changes now end with a concise closure summary that carries delivery results and key review/verify signal.\",\"peer_spec_review\":\"Summary for review: add a lightweight closure-summary requirement to standard change files so completed work records challenges, learnings, and outcomes for future analysis without turning every change into a long retrospective.\\n\\nClaude review:\\n\\n- the three buckets needed a one-line distinction or agents would blur them\\n- the closure shape also needed to mention peer-review and verify takeaways explicitly\\n- the spec needed to say whether `nothing notable` is allowed\\n- the enforcement point needed to be explicit: guidance versus completion requirement\\n- the docs scope needed to be narrowed so implementation would not scatter\\n\\nValid feedback addressed:\\n\\n- the acceptance criteria now require one-line prompts in the template\\n- the closure summary now folds peer-review and verify takeaways into `Outcomes`\\n- `.spec/FLOW.md` is the explicit completion gate for standard changes\\n- `nothing notable` is allowed when there is no real signal\\n- scope is narrowed to the template, `.spec/FLOW.md`, and the example file\",\"peer_code_review\":\"Claude review:\\n\\n- no bugs in the final implementation\\n- the example file now models the finished flow cleanly, including `Dust`\\n- non-blocking notes: the closure prompt style is still lightweight guidance rather than a hard-enforced schema, and the closure requirement is process-level rather than mechanically gated\\n\\nResolution:\\n\\n- kept the lightweight prompt style on purpose for v1\\n- kept closure as a completion requirement in the flow rather than adding a new hook gate\",\"verify\":\"- [pass] The change template includes a dedicated closure section for challenges, learnings, outcomes, and `Dust`, with one-line prompts that distinguish the buckets\\n  `_template.md` now includes four explicit closure lines with short prompts, a `nothing notable` allowance, and a concise `Dust` hint.\\n- [pass] `.spec/FLOW.md` treats the closure summary as part of standard-change completion before moving a change to `done`, folds notable peer-review and verify takeaways into `Outcomes`, allows a concise `nothing notable` entry when there is no real signal, and keeps `Dust` to a short artistic line under 80 characters\\n  The `done` state and `Rules for the AI` both require the closure summary and describe the expected shape.\\n- [pass] The requirement lives in the template and `.spec/FLOW.md`, stays minimal, is framed as future-analysis context rather than a long retrospective, and is demonstrated in `_example-dark-mode.md`\\n  The example file now shows a completed verify plus closure section without adding extra ceremony elsewhere.\"}","{\"name\":\"add-sod-analysis-and-versioning\",\"status\":\"done\",\"ts\":\"2026-04-14T00:00:00Z\",\"what\":\"Add a lightweight `sod` reporting flow to `spec-of-dust` so the repo tracks its own footprint over time. Generate a committed analysis file with per-file lines, words, characters, and estimated tokens; expose a short summary in `README.md`; require commits that change the repo to include the refreshed analysis file; and start explicit project versioning at `0.0.1`.\",\"dust\":\"\",\"challenges\":\"\",\"learnings\":\"\",\"outcomes\":\"\",\"peer_spec_review\":\"Summary for review: add a generated `sod` report, a README summary block, commit-hook enforcement for stale report changes, and a manual `VERSION` file starting at `0.0.1`.\\n\\nClaude review:\\n\\n- token estimate formula needed to be pinned\\n- file scope needed to be defined\\n- hook semantics needed to say how this interacts with the existing skip path\\n- version file path and bump semantics needed to be explicit\\n\\nValid feedback addressed:\\n\\n- report path narrowed to `.spec/sod-report.md`\\n- script path narrowed to `scripts/update-sod-report.sh`\\n- file scope narrowed to Git-tracked text files\\n- token estimate fixed to `ceil(characters / 4)`\\n- version file narrowed to `VERSION`\\n- version bumps are manual; skip flow remains separate\",\"peer_code_review\":\"Claude review:\\n\\n- the SOD gate should ignore the generated report file when deciding whether a refresh is required\\n- the skip path should bypass SOD enforcement cleanly so trivial logged commits do not deadlock at `prepare-commit-msg`\\n- `setup.sh` should initialize `VERSION` so the workflow is bootable from a fresh clone\\n- the staged-versus-working-tree wording around the refresh gate needed to stay precise\\n\\nVa ld to read the current change against nearby repo context and report broader critiques when relevant, without turning every review into a full repo sweep.\\n\\nClaude review:\\n\\n- `nearby repo context` needed a concrete scoping heuristic\\n- the spec needed to say whether broader critiques are advisory or blocking\\n\\nValid feedback addressed:\\n\\n- the acceptance criteria now require an explicit context heuristic\\n- the notes now say broader critiques are advisory unless they reveal a real blocker in the current change\",\"peer_code_review\":\"Claude review:\\n\\n- all three acceptance criteria are met\\n- no bugs or missed requirements in the prompt changes\\n- one non-blocking note remains: the post-build review still references the spec by path rather than piping it on stdin, so filesystem access is still assumed as before\\n\\nResolution:\\n\\n- kept the existing path-based spec reference because it matches the current local CLI workflow\\n- noted that this is a pre-existing assumption, not a regression from this change\",\"verify\":\"- [pass] `.spec/FLOW.md` updates the pre-build review prompt so the reviewer is asked to assess the spec in repo context, not as an isolated snippet, and uses a concrete heuristic for which extra files to read\\n  The prompt now scopes extra context to the active change file, directly referenced files, and obviously adjacent files only.\\n- [pass] `.spec/FLOW.md` updates the post-build review prompt so the reviewer is asked to compare the diff against the spec and use nearby codebase context when needed, with the same scoping heuristic\\n  The post-build prompt now names the spec, changed files, directly referenced files, and obviously adjacent files as the allowed extra context.\\n- [pass] The review protocol tells the reviewing model to report broader critiques or errors when they are relevant, while still prioritizing concrete issues with the current change, and makes clear that broader critiques are advisory unless they expose a real blocker for the current change\\n  Both prompts now say broader critiques are advisory unless they reveal a missed requirement, bug, unsafe design, or contradiction with the spec, and the workflow steps reflect the same rule.\"}","{\"name\":\"final-polish-and-ci\",\"status\":\"done\",\"ts\":\"2026-04-15T00:51:56Z\",\"what\":\"Finish the last low-risk polish items before first public release. Trim the peer-review prompt wording without losing the key review rules, remove the ambiguous empty `starters` field from the pack manifest, make the docs scaffold match its own README by adding `docs/product/`, and add a minimal GitHub Actions workflow that runs the current shell-based validation flow.\",\"dust\":\"The last polish was mostly about removing guesses.\",\"challenges\":\"The only tricky part was keeping the hook harness stable as the repo’s own active change state kept moving under it.\",\"learnings\":\"For self-hosting workflow repos, tests should seed their own fixture state instead of depending on whatever change file happens to be active.\",\"outcomes\":\"The prompts are shorter, the pack manifest is cleaner, the docs tree matches its README, and the repo now has a minimal Actions workflow that runs the same shell validation flow used locally.\",\"peer_spec_review\":\"Summary for review: finish the last small release-polish items by shortening the peer-review prompt examples, removing the empty `starters` field from the pack manifest, creating `docs/product/`, and adding a minimal Actions workflow that runs the shell-based validation flow.\\n\\nClaude review:\\n\\n- the CI criterion needed explicit triggers and runner choice\\n- the prompt-shortening criterion needed a concrete bound\\n- the spec needed to say whether `docs/product/` was just a placeholder dir\\n- the notes should call out that `setup.sh` must work on Linux\\n\\nValid feedback addressed:\\n\\n- CI now targets `push`, `pull_request`, and `workflow_dispatch` on `ubuntu-latest`\\n- th
