00:51:56Z\",\"what\":\"Extend `spec-of-dust` so merge behavior is an explicit part of completion, with a small startup config that decides whether completed work waits for a human, asks for confirmation, or merges automatically. Keep the main state machine simple, but add a shared archive script and a merge helper so agents can finish one work package, merge it when appropriate, archive the completed change file, and move on cleanly.\",\"dust\":\"A workflow starts feeling real when it can close its own loops.\",\"challenges\":\"The merge helper only became honest once it learned the repo’s own SOD rules and stopped assuming archive commits were exempt from them.\",\"learnings\":\"Completion automation in a self-hosting workflow repo needs to respect the same gates it asks every other repo to respect.\",\"outcomes\":\"Merge behavior is now explicit, configurable, and scripted, with a shared archive path, a merge helper, and clear `manual`/`confirm`/`auto` semantics.\",\"peer_spec_review\":\"Summary for review: add explicit merge-and-advance behavior after `done`, with `merge: manual | confirm | auto` plus `merge-target`, a shared archive script, and a safe merge helper that can archive or merge completed work without changing the core four-state workflow.\\n\\nClaude review:\\n\\n- `confirm` needed an explicit ask/deny behavior\\n- the failure story needed to say what happens if merge fails\\n- the archive script versus merge-helper boundary needed to be explicit\\n- `merge-target` needed a default\\n- `auto` should be tied to passing local gates, not just a clean tree\\n\\nValid feedback addressed:\\n\\n- `confirm` now explicitly asks and stays at `done` if the answer is no\\n- merge failures now leave the change at `done` and report the error\\n- the merge helper is now explicitly defined as a caller of the archive script\\n- `merge-target` defaults to `main`\\n- `auto` now requires passed local gates as well as a safe repo state\",\"peer_code_review\":\"Claude review:\\n\\n- no blocker remained in the final diff\\n- advisory notes were about whether `update-sod-report.sh --check` existed, restoring branch context on failure, and the absence of dedicated tests for the new scripts\\n\\nResolution:\\n\\n- `update-sod-report.sh --check` already existed and is now used explicitly by `--auto`\\n- the merge helper now reports the branch on failure instead of failing silently\\n- merge behavior was verified in temp repos for archive-on-target, archive+merge-from-feature, dirty-tree refusal, and stale-SOD refusal in `--auto`\",\"verify\":\"- [pass] `.spec/FLOW.md` documents merge behavior after `done`, including `merge: manual | confirm | auto` and `merge-target: <branch>` as startup config values, with `main` as the default target when omitted\\n  `FLOW.md` now defines the merge modes, the default target, the explicit confirm behavior, and the failure behavior without adding a new workflow state.\\n- [pass] `.spec/b-startup.md` includes a live merge configuration for this repo\\n  The live boot brief now includes `merge: confirm` and `merge-target: main`.\\n- [pass] A shared archive script exists in `scripts/` and the existing `post-merge` hook delegates to it instead of carrying separate archive logic\\n  `scripts/archive-done-changes.sh` now owns the archive behavior, and `.githooks/post-merge` delegates to it.\\n- [pass] A repo-local merge helper exists in `scripts/`, calls the shared archive script, and can either archive completed changes on the current target branch or merge a completed feature branch into the configured target branch\\n  `scripts/merge-completed-work.sh` archives on the target branch and performs archive+`--no-ff` merge from feature branches.\\n- [pass] The merge helper refuses unsafe states: missing Git repo, dirty working tree, no completed standard change file to archive/advance, or unmet local-gate prerequisites for an `auto` merge\\n  Temp-repo verification showed dirty-tree refusal and `--auto` refusal when SOD was stale; the helper also checks for a Git repo and requires at least one `done` change file.\\n- [pass] The flow defines `confirm` as an explicit ask-to-merge step, and on merge failure the change remains `done` while the error is reported without inventing a new state\\n  `FLOW.md` now defines the ask/deny behavior for `confirm`, and the helper reports failure without mutating workflow state.\\n- [pass] The change records peer reviews, verification notes, and closure in the normal `spec-of-dust` flow, and the SOD outputs are refreshed at the end\\n  This change file now contains the full review/verify record and the final SOD refresh happens before the closing commit.\"}","{\"name\":\"add-jsonl-append-helpers\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Add bash scripts that safely append structured JSONL entries to `devlog.jsonl` and `flowlog.jsonl`, so agents call a command with named args instead of hand-crafting JSON. This eliminates format drift and keeps the logs machine-readable.\",\"dust\":\"The machine learned to write its own diary entries safely.\",\"challenges\":\"Codex caught an unbound-variable edge case in arg parsing that `set -u` would have surfaced at runtime. Good catch.\",\"learnings\":\"When using `set -euo pipefail`, every positional read needs a bounds check — bash won't give you a friendly error, it'll just crash.\",\"outcomes\":\"Both JSONL files now have validated append helpers. Agents call a script instead of crafting JSON. Format drift eliminated.\",\"peer_spec_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: validation must cover enum values, not just required fields. `--kind` must match one of the allowed skip kinds and `--sentiment` must be `smooth|rough|blocked`, or the helper produces entries that fail the gate.\\n2. Blocker: `--files` as comma-separated list is overbuilt — skip mode only allows one target file. Simplify to `--file` with one path.\\n3. Risk: \\\"use printf or equivalent\\\" is hand-wavy — need to specify actual escaping behavior for `\\\"`, `\\\\`, and control chars.\\n\\n-> Addressed: enum validation added to acceptance criteria, `--files` changed to `--file` (single path, output as one-element array), escaping requirement made explicit.\",\"peer_code_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: `$2` read without checking arg count — `set -u` causes unbound variable crash instead of clean usage message when a flag is passed without a value.\\n2. Blocker: SOD not refreshed — tracked text files changed but no `.spec/sod-report.md` update staged.\\n3. Advisory: `--agent` accepts any value — should validate `claude|codex`.\\n\\n-> Addressed: added `[ $# -ge 2 ]` guard before every `$2` read. Added `--agent` validation for `claude|codex`. SOD will be refreshed before commit.\",\"verify\":\"- [pass] `scripts/devlog.sh` accepts `--kind`, `--summary`, `--reason`, `--file` and appends valid JSONL with all required fields\\n- [pass] `scripts/flowlog.sh` accepts `--change`, `--agent`, `--sentiment` plus optional fields and appends valid JSONL\\n- [pass] Both validate required fields, enum values (`--kind` against allowed skip kinds, `--sentiment` against smooth/rough/blocked, `--agent` against claude/codex), and exit non-zero with usage on invalid input\\n- [pass] Both escape `\\\"`, `\\\\`, and control chars (tabs, newlines, carriage returns) — verified with embedded quotes and backslashes\\n- [pass] `.spec/FLOW.md` mentions both helpers as preferred append method\"}","{\"name\":\"add-workflow-feedback-log\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Add a structured feedback log (`.spec/flowlog.jsonl`) where agents record friction, divergences, and suggestions about the spec-of-dust flow itself when completing a standard change. This gives us a beta-phase signal channel for improving the workflow based on real usage, separate from the feature-level closure summary and the skip-mode devlog.\",\"dust\":\"The machine learned to talk about how it feels about working.\",\"challenges\":\"Codex caught three valid blockers — ordering ambiguity, schema weakness, and missing setup.sh provisioning. All required rework before verify.\",\"learnings\":\"Codex CLI uses `codex exec` not `codex -q` — the FLOW.md prompts need updating for the current Codex CLI API.\",\"outcomes\":\"Workflow now has a beta feedback channel. Agents record flow-level friction separately from feature closure. Setup.sh provisions it for downstream repos.\",\"peer_spec_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: transition ordering is ambiguous — \\\"after closure, before archival\\\" doesn't pin whether flowlog happens before or after `status: done`. If the agent marks done first and appends later, the change can archive without the log entry. Spell out exact order: closure filled, flowlog appended, then status: done.\\n\\n2. Risk: schema is too weak — no `timestamp`, no `agent`/`model` field. In a repo that explicitly compares Claude vs Codex, that loses obvious diagnostic value.\\n\\nAdvisory: updating CLAUDE.md and CODEX.md is fine but redundant unless very short and pointing back to FLOW.md.\\n\\n→ Addressed: acceptance criteria now specify \\\"before setting `status: done`\\\" and require `ts` and `agent` fields. CLAUDE.md/CODEX.md updates will be one-liner pointers.\",\"peer_code_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: \\\"any field\\\" blank allowance is too broad — permits empty `ts`, `agent`, `change`, `sentiment`. Limit blank values to free-text fields only.\\n2. Blocker: `setup.sh` doesn't create `flowlog.jsonl` — downstream repos won't have it after setup.\\n3. Blocker: SOD outputs not refreshed after tracked text-file changes.\\nAdvisory: README root layout should mention `flowlog.jsonl`.\\n\\n→ Addressed: narrowed blank allowance to `flow_divergence`/`friction`/`suggestion` only. Added `touch .spec/flowlog.jsonl` to `setup.sh`. Added `flowlog.jsonl` to README layout. SOD will be refreshed before commit.\",\"verify\":\"- [pass] `.spec/flowlog.jsonl` exists and is initialized (empty)\\n- [pass] `.spec/FLOW.md` adds a flowlog step to the `done` transition with correct ordering and required fields (`ts`, `agent`, `change`, `flow_divergence`, `friction`, `suggestion`, `sentiment`)\\n- [pass] The AI rules section in `.spec/FLOW.md` mentions the flowlog requirement for standard changes\\n- [pass] No hook enforcement — guidance only, no changes to `_spec_gate.sh`\\n- [pass] `CLAUDE.md` and `CODEX.md` each have one line pointing to FLOW.md for flowlog\"}","{\"name\":\"add-workflow-log-viewer\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Add a self-contained HTML file that reads the JSONL log files (`devlog.jsonl`, `flowlog.jsonl`) and renders them in a clean, browsable UI. This gives humans a way to review workflow history, sentiment, and flow feedback without reading raw JSONL. Zero dependencies — one HTML file, inline CSS and JS, reads the logs client-side.\",\"dust\":\"The dust settles where you can see it.\",\"challenges\":\"Security hook flagged innerHTML usage, required refactoring to DOM construction. Codex caught several real spec mismatches in field rendering.\",\"learnings\":\"DOM construction is cleaner for dynamic UIs even in vanilla JS — no sanitization worries and the code reads better.\",\"outcomes\":\"Humans can now browse workflow logs visually. The warm earth-tone design matches the project identity.\",\"peer_spec_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: devlog entries have no `agent` or `change` fields — spec requires showing them for every entry. Need fallback behavior.\\n2. Blocker: Dust lives in change-file closures, not in JSONL logs — drop from scope or add a data source.\\n3. Risk: file input model unclear — one file or multiple? How is source type inferred?\\n4. Advisory: \\\"sentiment trends\\\" is vague and overbuilt — just show badges.\\n5. Advisory: \\\"visual language from index.html\\\" is thin — palette/type only.\\n\\n-> Addressed: missing fields show `—`, Dust dropped from scope, multi-file input with structure-based type inference, \\\"trends\\\" cut to colored badges.\",\"peer_code_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: not all fields rendered, missing fields don't show `—`. Devlog only showed reason/file, flowlog only showed feedback when truthy.\\n2. Blocker: source inference only matched `event === \\\"skip-no-verify\\\"` instead of checking for `event` key existence.\\n3. Medium: drop zone hidden after first load — can't add a second file without refreshing.\\n4. Advisory: SOD not refreshed.\\n\\n-> Addressed: all fields now rendered for both types with `—` for missing. Inference uses `\\\"event\\\" in obj`. Drop zone stays visible after loading. SOD refreshed before commit.\",\"verify\":\"- [pass] `docs/viewer.html` exists as a single self-contained HTML file with inline CSS and JS (526 lines, no external deps)\\n- [pass] Renders both devlog and flowlog entries in a unified timeline, sorted newest-first by timestamp\\n- [pass] Each entry shows all available fields; missing fields (e.g. `agent` on devlog) render as `—`\\n- [pass] Sentiment badges are colored: smooth (green), rough (amber), blocked (red)\\n- [pass] Multi-file input via drag-drop or file picker; source type inferred from JSONL structure (`event` key = devlog, `sentiment` key = flowlog); drop zone stays visible for adding more files\\n- [pass] Design matches spec-of-dust visual language: Georgia serif, warm earth tones, card layout\\n- [pass] No external dependencies: no CDN, no build step, no framework\"}","{\"name\":\"condensation-review\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Review the entire spec-of-dust repo for bloat, redundancy, and unnecessary complexity. This project is called \\\"spec of dust\\\" — it should be minimal. Evaluate every file, script, and doc surface for whether it earns its place. Produce a concrete condensation plan: what to merge, what to delete, what to simplify. This is a review-only spec — no code changes, just a written assessment with actionable recommendations.\",\"dust\":\"The dust weighed itself and found it was carrying sand.\",\"challenges\":\"Codex stalled during spec review so no peer check on this one. The assessment had to be brutally honest about work done in this session.\",\"learnings\":\"A third of the repo is a viewer that didn't exist 3 hours ago. Building features inside a framework repo creates compounding weight.\",\"outcomes\":\"Clear condensation roadmap: simplify the viewer pipeline first (biggest win), merge the log scripts, trim redundant docs.\",\"peer_spec_review\":\"Codex CLI stalled during review (66 lines output, no verdict after 60s). Proceeding without — this is a review-only spec with no code risk.\",\"peer_code_review\":\"N/A — review-only spec, no code changes.\",\"verify\":\"- [pass] Written assessment covers LOC/token count (46 files, 4040 lines, ~56k tokens), file-by-file evaluation, doc redundancy, and script overlap\\n- [pass] 3 concrete condensation actions identified, ranked by impact (viewer pipeline -400 lines, merge log scripts -70 lines, trim docs -30 lines)\\n- [pass] Each action has estimated LOC reduction and risk assessment\\n- [pass] Assessment is honest about what was over-built: viewer pipeline, bash markdown parser, auto-rebuild chain\"}","{\"name\":\"embed-change-history-in-viewer\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Extend the log viewer to also display spec change files (from `.spec/changes/` and `.spec/archive/`), with Dust lines given prominent visual treatment. The build script should parse change file markdown, extract key sections (status, what, closure including Dust), and embed them alongside the JSONL data so the viewer shows the full workflow history in one place.\",\"dust\":\"Every spec leaves a fingerprint; now they're all in one window.\",\"challenges\":\"Skipped the workflow for a mid-build edit (drop zone removal) — had to fold it back into the spec. Bash markdown parser needed careful line-by-line extraction.\",\"learnings\":\"The commit gate passes if any change file is active, not if the edit relates to it. Discipline, not hooks, keeps the flow honest.\",\"outcomes\":\"The viewer now shows the full project history — changes, flowlog, devlog — with Dust lines front and center.\",\"peer_spec_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: mtime is unstable for active files — every edit reorders history. Need a stable timestamp source.\\n2. High: parser contract underspecified — no defined extracted object shape, will lead to ad-hoc parsing.\\n3. High: drop zone only accepts JSONL but changes are markdown — clarify that changes are embedded-only.\\n\\n-> Addressed: archived files use date prefix, active done files match flowlog timestamps, non-done files go in separate \\\"Active\\\" section. Object shape defined explicitly. Drop zone stays JSONL-only.\",\"peer_code_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: no separate Active section — non-done changes dump to bottom of timeline instead of above it.\\n2. High: peer review/verify truncated to 200 chars — destroys the record. Show full text in collapsible.\\n3. High: `what` uses first line, not first paragraph — breaks on hard-wrapped markdown.\\n4. Medium: closure hidden in collapsible and placeholder values like `- Challenges:` render as truthy.\\n\\n-> Addressed: active non-done changes now rendered above timeline in \\\"Active Work\\\" section. Review/verify show full text. What uses first paragraph. Closure shown inline with placeholder filtering.\",\"verify\":\"- [pass] `build-viewer.sh` reads change files from both directories, excludes template/example files, extracts metadata and closure fields including Dust, and embeds as `EMBEDDED_CHANGES`\\n- [pass] Archived files sort by date prefix; active done files match flowlog timestamps; non-done active files appear in \\\"Active Work\\\" section above the timeline\\n- [pass] Dust lines styled as pull-quotes with accent color and breathing room\\n- [pass] Change entries show name, status badge, what (first paragraph), and inline closure\\n- [pass] Peer review and verify in collapsible details with full text\\n- [pass] Filter buttons include \\\"Changes\\\" option\\n- [pass] Drop zone removed — all data is embedded\"}","{\"name\":\"embed-jsonl-in-viewer\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Make the log viewer work by embedding the JSONL data directly inside the HTML file, so it renders immediately when opened from any context (file://, GitHub Pages, anywhere). Add a bash script that reads `devlog.jsonl` and `flowlog.jsonl` and rebuilds `docs/viewer.html` with the data baked into a `<script>` block. Keep the drop zone as a fallback for loading external files.\",\"dust\":\"The page remembers what the machines felt.\",\"challenges\":\"awk can't handle multiline string variables — had to write data to temp file and read it back. grep interprets `*` in markers as regex — needed `-F`.\",\"learnings\":\"Embedding data in HTML that rewrites itself needs strict marker validation and escape coverage for all JS-breaking characters, not just the obvious ones.\",\"outcomes\":\"Viewer loads instantly with baked-in data from any context. Append helpers keep it fresh automatically.\",\"peer_spec_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: spec doesn't say when build-viewer.sh runs — viewer will go stale unless rebuild trigger is explicit.\\n2. Blocker: raw JSONL in `<script>` is easy to break with `<\\\\/script>`, quotes, line separators. Require safe escaping and round-trip verification.\\n3. Contradiction: \\\"visually identical\\\" is too strict since the auto-load text is being removed. Use \\\"same layout/styles.\\\"\\n4. Advisory: \\\"generated file\\\" plus \\\"replace only the data block\\\" is muddled — clarify ownership model.\\n\\n-> Addressed: append helpers now call build-viewer.sh after each write. Escaping contract made explicit (`<\\\\/script>`, JSON special chars). \\\"Identical\\\" changed to \\\"same layout and styles.\\\" Template ownership clarified — HTML is both template and output, only data block is replaced.\",\"peer_code_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: U+2028/U+2029 line separators not escaped — can break JS string in `<script>`.\\n2. Blocker: `|| true` masks build-viewer failures — append succeeds but viewer goes stale silently.\\n3. High: no marker validation — malformed HTML could cause silent no-op or truncation.\\n4. Medium: embedded parse failures swallowed silently.\\n5. Advisory: SOD not refreshed.\\n\\n-> Addressed: added sed escape for U+2028/U+2029. Replaced `|| true` with `if [ -x ]` guard. Added marker count validation with `grep -cF`. SOD refreshed before commit.\",\"verify\":\"- [pass] `scripts/build-viewer.sh` reads both JSONL files, escapes backslashes/quotes/`<\\\\/script>`/U+2028/U+2029, and replaces the data block between markers\\n- [pass] `docs/viewer.html` renders embedded data immediately on page load — tested by opening the file\\n- [pass] Drop zone remains visible for loading additional files\\n- [pass] Auto-fetch code removed — no more `fetch()` calls\\n- [pass] Layout and styles unchanged from previous version\\n- [pass] `devlog.sh` and `flowlog.sh` call `build-viewer.sh` after appending — tested with flowlog append\"}","{\"name\":\"fix-claude-review-command-drift\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Align `CLAUDE.md` with `.spec/FLOW.md` so the documented Claude-side peer-review command matches the current Codex CLI invocation. `.spec/FLOW.md` is the source of truth; this change makes `CLAUDE.md` conform to it. This removes process drift in a workflow that depends on the cross-model review step working reliably.\",\"dust\":\"One token less wrong, one trap less waiting.\",\"challenges\":\"The bug was tiny, but it mattered because this repo depends on documented peer-review commands being correct.\",\"learnings\":\"Process docs drift in exactly the places nobody expects to re-check; the safest fix is to keep one file authoritative and make adapters conform to it.\",\"outcomes\":\"`CLAUDE.md` now matches `.spec/FLOW.md` on the Codex review command, removing an avoidable peer-review failure path.\",\"peer_spec_review\":\"**Claude** (2026-04-16):\\n\\nClear and well-scoped. The drift is real: `CLAUDE.md` says `codex -q` while `.spec/FLOW.md` says `codex exec`. Main clarification needed was source of truth; this spec now makes `.spec/FLOW.md` authoritative. Follow-up note: broader restructuring of Claude guidance could happen later, but is not required for this fix. No blockers.\",\"peer_code_review\":\"**Claude** (2026-04-16):\\n\\nVerdict: pass, no blockers.\\n\\n- `CLAUDE.md` now uses `codex exec`, matching `.spec/FLOW.md`\\n- The diff is minimal and does not add new workflow rules\\n\\nAdvisory only: the broader two-phase review examples in `.spec/FLOW.md` are still richer than the short Claude note, but that is pre-existing and out of scope. SOD refresh still needs to be staged before commit.\",\"verify\":\"- [pass] `CLAUDE.md` documents the same Codex review command family as `.spec/FLOW.md`\\n  Verified by `rg -n 'codex exec' CLAUDE.md .spec/FLOW.md`, which now shows `codex exec` in both files.\\n- [pass] The Claude-specific guidance remains concise and does not add new workflow rules beyond the command correction\\n  Verified by the one-token documentation change in `CLAUDE.md`.\\n- [pass] Repo metrics are refreshed after the doc change\\n  Verified during final batch closeout by running `bash scripts/update-sod-report.sh` after the doc and workflow-state updates.\"}","{\"name\":\"fix-setup-template-drift\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Align the template generated by `setup.sh` with the live `.spec/changes/_template.md` so downstream repos start with the current workflow contract, including the `files:` metadata line used by the scope gate.\",\"dust\":\"Even the blank line at the top has a job.\",\"challenges\":\"Claude review calls were slow, but the actual fix itself stayed surgical.\",\"learnings\":\"A scaffolded template is part of the product surface; letting it drift from the live template breaks downstream repos quietly.\",\"outcomes\":\"`setup.sh` now emits the same metadata header as the live change template, and the hook test suite includes a regression check for the scaffold path.\",\"peer_spec_review\":\"**Claude** (2026-04-16):\\n\\nClear and well-scoped. The drift is real: `setup.sh` emits `status: spec` with no `files:` line, while the live template has both. Main note: criterion 3 needed a bounded mechanism so it does not turn into a larger sync system. A simple repo-local shell assertion is enough. Also clarified that fixing already-existing downstream templates is out of scope. No blockers.\",\"peer_code_review\":\"**Claude** (2026-04-16):\\n\\nVerdict: clean, no blockers.\\n\\n- `setup.sh` now includes `files:` directly below `status: spec`, matching the live template shape\\n- Closure prompts and section order remain unchanged\\n- Added `setup_scaffold_includes_files_metadata()` to `tests/test-spec-gate.sh`, which creates a fresh repo, removes any existing template, runs `setup.sh`, and asserts both required metadata lines exist\\n\\nAdvisory only: the test checks line existence rather than relative ordering, which is acceptable here because the heredoc controls the order.\",\"verify\":\"- [pass] `setup.sh` generates a change template that includes the same top metadata shape as the live template, including a blank `files:` line below `status:`\\n  Verified by the `setup.sh` heredoc and by the repo-local scaffold test added in `tests/test-spec-gate.sh`.\\n- [pass] The generated template still preserves the current closure prompts and section order\\n  Verified by inspecting the updated heredoc in `setup.sh`; only the blank `files:` line was added below `status: spec`.\\n- [pass] Repo-local verification covers the scaffolded template shape via a concrete shell assertion in `tests/test-spec-gate.sh` or another existing repo-local test path\\n  Verified by `setup_scaffold_includes_files_metadata()` in `tests/test-spec-gate.sh`, and the full hook suite passes with `bash tests/test-spec-gate.sh`.\"}","{\"name\":\"fix-viewer-archive-filename-parsing\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Correct archive filename parsing in `scripts/build-viewer.sh` so timestamped archived change files keep their intended change name and timestamp when embedded into `docs/viewer.html`. Right now the generic archive-name pattern matches first and misparses files like `YYYY-MM-DD-HHMMSS-name.md`.\",\"dust\":\"The archive kept the time once we asked correctly.\",\"challenges\":\"The fix itself was small; the heavier part was proving it against the baked viewer data rather than just eyeballing the bash regex.\",\"learnings\":\"Filename parsers should match the most specific pattern first, especially in bash where one loose branch can swallow the whole namespace.\",\"outcomes\":\"Timestamped archived changes now keep both the right name and the right HHMMSS-derived timestamp in the viewer.\",\"peer_spec_review\":\"**Claude** (2026-04-16):\\n\\nSpec is clear and the bug is real. The generic archive-name pattern matches first and swallows the HHMMSS chunk into the change name. Main clarifications needed were: this is a match-order fix, and the timestamped form should preserve time in `ts` rather than discarding it. With that pinned down, the change is minimal and appropriately scoped. No blockers.\",\"peer_code_review\":\"**Claude** (2026-04-16):\\n\\nVerdict: pass, no blockers.\\n\\n- The timestamped archive pattern now runs before the generic date-only pattern\\n- `HHMMSS` is correctly split into `HH:MM:SS` for `ts`\\n- Rebuilt embedded viewer data reflects `2026-04-15T00:51:56Z` for existing timestamped archived changes instead of collapsing them to midnight\\n\\nOnly remaining item was the verify-phase requirement to check against an existing archived file in this repo.\",\"verify\":\"- [pass] `scripts/build-viewer.sh` checks `YYYY-MM-DD-HHMMSS-name.md` before `YYYY-MM-DD-name.md`, so timestamped archived changes keep the correct change name and preserve the time chunk in `ts`\\n  Verified by inspecting the reordered archive-name parsing branches in `scripts/build-viewer.sh`.\\n- [pass] Rebuilding `docs/viewer.html` shows timestamped archived changes with the correct change name and a `ts` that includes the archived HHMMSS time instead of collapsing to midnight\\n  Verified by rebuilding the viewer and parsing `EMBEDDED_CHANGES` from `docs/viewer.html`; `final-polish-and-ci` and `merge-and-advance-workflow` now both resolve to `2026-04-15T00:51:56Z`.\\n- [pass] Verification includes a concrete check against an existing timestamped archived change file in this repo\\n  Verified against `.spec/archive/2026-04-15-005156-final-polish-and-ci.md` and `.spec/archive/2026-04-15-005156-merge-and-advance-workflow.md` via the rebuilt embedded viewer data.\"}","{\"name\":\"full-repo-evaluation\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Perform a repo-wide evaluation of `spec-of-dust` before further feature work. Review the workflow, docs, hooks, scripts, tests, logs, packs, and publishing surfaces for clarity, contradictions, overbuild, maintenance risk, and whether each file earns its place. This is a review-only change: the deliverable is a written assessment and recommendation, not product behavior changes.\",\"dust\":\"The framework is sound; the edges are where the dust gathers.\",\"challenges\":\"The required peer-review step worked, but both Claude CLI calls were slow enough to look stalled. That makes the protocol feel brittle during review-only work.\",\"learnings\":\"The workflow core is in better shape than the surrounding adapters. Most of the real risk is now source-of-truth drift between docs, scaffolds, and visualization tooling.\",\"outcomes\":\"Completed a repo-wide evaluation, captured three high-priority fixes, verified the local hook suite still passes, and refreshed flowlog/viewer/SOD outputs. The updated SOD summary now shows operational context at `5492 / 5000 target`, which supports trimming before adding more meta-surface area.\",\"peer_spec_review\":\"**Claude** (2026-04-16):\\n\\nSolid scope for a review-only self-audit. The criteria are checkable. Notes:\\n\\n1. Ambiguous: \\\"written assessment exists in this change file\\\" implies the build artifact lives here and may get large. Fine, but clarify whether this file is the sole deliverable.\\n2. Missing: \\\"repo-wide\\\" scope boundary. The criteria should prioritize surfaces so the review does not go shallow everywhere.\\n3. Missing: criterion 2 asks for severity but does not define it. A simple scale would make verify less subjective.\\n4. Advisory: closure is pre-filled with `nothing notable`; verify should ensure it is replaced before `done`.\\n\\nVerdict: no blockers. Add a priority order and a severity scale, then proceed.\",\"peer_code_review\":\"**Claude** (2026-04-16):\\n\\nVerified findings:\\n\\n1. `setup.sh` template drift — confirmed. The live template has `files:`; the `setup.sh` scaffold does not.\\n2. `CLAUDE.md` review command drift — confirmed. `codex -q` conflicts with `.spec/FLOW.md`'s `codex exec`.\\n3. `build-viewer.sh` regex order bug — confirmed. The generic archive-name pattern matches before the timestamped one.\\n4. JSON escaping gap in `devlog.sh` / `flowlog.sh` — confirmed. The escaping is minimal, not complete.\\n5. Archive hygiene finding — confirmed. Many completed change files still sit in `.spec/changes/`.\\n\\nAgainst the spec criteria:\\n\\n- [x] Written assessment exists and covers the required surfaces\\n- [x] Findings include severity and file references\\n- [x] Simplification opportunities and next actions are present\\n- [x] Recommendation is clear\\n\\nIssue with the diff itself:\\n\\n- Closure still contained placeholder text and needed to be completed before `done`\\n\\nNo blockers. Ready for `status: verify`.\",\"verify\":\"- [pass] A written assessment exists in this change file covering the workflow, core docs, hooks, scripts, tests, docs surfaces, and pack/publishing scaffolding\\n  Verified in `## Assessment`, with dedicated sections for workflow core, docs, scripts, docs surfaces, and pack/publishing scaffolding.\\n- [pass] The assessment identifies concrete blockers, risks, and redundancy with severity and file references where relevant\\n  Verified in `## Findings`; no blocker-level failures were found, and high/medium/advisory findings cite the relevant files and line regions.\\n- [pass] The assessment identifies simplification opportunities with recommended next actions\\n  Verified in `## Recommended next actions`, with six concrete follow-ups.\\n- [pass] The assessment ends with a clear recommendation on whether to proceed as-is, trim first, or restructure before new feature work\\n  Verified in `## Recommendation`: proceed after fixing the three high-priority drift issues, then pause on new meta-features.\\n\\nAdditional verification:\\n\\n- [pass] Required post-build peer review completed with no blockers\\n  Claude review is recorded in `## Peer code review`.\\n- [pass] Repo-local validation still passes after the review change\\n  Ran `bash tests/test-spec-gate.sh` successfully (all 11 tests passed) and `bash scripts/update-sod-report.sh --check` successfully.\\n- [pass] Required closeout artifacts were refreshed\\n  Appended `.spec/flowlog.jsonl`, rebuilt `docs/viewer.html`, and refreshed `README.md` plus `.spec/sod-report.md`.\"}","{\"name\":\"operational-context-budget\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Add an operational context metric to the SOD report that tracks only the files agents ingest on session start — the bootstrap chain. This gives a concrete token budget for the framework's own footprint, separate from project-specific files like `AGENTS.md` and `CLAUDE.md` that will grow with the project. Target: 3k tokens for the bootstrap, 5k ceiling including project files.\",\"dust\":\"A spec of dust finally learned to weigh itself.\",\"challenges\":\"Active change selection logic was tricky — needed to prefer in-progress over done, not just grab the first alphabetic match.\",\"learnings\":\"The bootstrap is already over budget at 3.4k — FLOW.md at 3.2k is 95% of it. The operational budget is healthy at 4.7k.\",\"outcomes\":\"Token budgets are now visible in every SOD refresh. The framework's weight is measurable.\",\"peer_spec_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: bootstrap set wrong — `_template.md` isn't session-start context. Bootstrap is `FLOW.md` + `b-startup.md` only.\\n2. Blocker: \\\"5k operational ceiling\\\" set undefined — needs exact file list including active change file.\\n3. Ambiguous: \\\"appears in README summary\\\" — specify format.\\n\\n-> Addressed: bootstrap narrowed to `FLOW.md` + `b-startup.md`. Operational set defined as bootstrap + `AGENTS.md` + `CLAUDE.md`/`CODEX.md` + active change. Format is extra lines with target vs actual.\",\"peer_code_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: active change selection picks first alphabetic done file, not actual in-progress. Should prefer spec|build|verify over done.\\n2. Missed: labels don't match spec — \\\"Bootstrap context\\\" vs required \\\"Bootstrap SOD\\\".\\n\\n-> Addressed: selection now prefers in-progress (spec|build|verify) over done. Labels aligned to \\\"Bootstrap SOD\\\" / \\\"Operational SOD\\\".\",\"verify\":\"- [pass] SOD report outputs Bootstrap SOD line counting FLOW.md + b-startup.md: `3377 / 3000 target`\\n- [pass] SOD report outputs Operational SOD line counting bootstrap + AGENTS.md + CLAUDE.md + CODEX.md + active change: `4731 / 5000 target`\\n- [pass] Both metrics appear in `.spec/sod-report.md` and README summary with target vs actual\\n- [pass] FLOW.md states budget principle with bootstrap 3k target and operational 5k target\"}","{\"name\":\"require-commit-after-done\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Enforce that once a standard change reaches `status: done`, it must be committed before more work proceeds. Right now the workflow relies on convention: a change can be marked `done` and then sit in the working tree while more edits accumulate. That weakens backlog discipline and makes it easy to batch unrelated completed changes into one commit. Add a local gate so a dirty `done` change blocks further normal commits until the repo records it.\",\"dust\":\"Done now means land it, not leave it lying around.\",\"challenges\":\"The main friction was test-fixture realism. The first pass failed because SOD and done-closeout behavior depend on index state, not just file contents.\",\"learnings\":\"A `done` state without a commit boundary is too soft. The hook needed to reason about dirty worktree plus index state, not only staged files, to actually stop stacking work.\",\"outcomes\":\"The workflow now mechanically blocks piling new work on top of an uncommitted completed change, and it blocks multiple dirty `done` changes from being closed out together by accident.\",\"peer_spec_review\":\"**Claude** (2026-04-16):\\n\\nGood scope and mechanically checkable criteria. Main ambiguities were what counts as \\\"additional work\\\" and what happens if multiple `done` changes pile up. Addressed by defining the allowed closeout artifact set and by explicitly blocking multiple dirty `done` changes at once. No blockers.\",\"peer_code_review\":\"**Claude** (2026-04-16):\\n\\nAll five acceptance criteria are covered. `.spec/FLOW.md` now states the closeout rule, the gate blocks dirty `done` changes plus extra work, the messages are clear, tests cover blocked and allowed cases, and multiple dirty `done` changes are blocked.\\n\\nNotes:\\n- `collect_dirty_done_changes` correctly keys off dirty tracked files, so staged-but-uncommitted `done` changes are caught\\n- The allowlist uses literal repo-relative paths, which is fine because the git commands here return that form\\n- No blockers; only nit was that Closure should be completed later during verify/done, not earlier\",\"verify\":\"- [pass] `.spec/FLOW.md` states that after a change reaches `done`, the next step is to commit it before starting or batching further standard work unless the human explicitly requests batching\\n  Verified in the `done` state steps and gate list in `.spec/FLOW.md`.\\n- [pass] `.githooks/_spec_gate.sh` blocks normal commits when there is an uncommitted `done` change file in `.spec/changes/` and dirty work extends beyond that completed change's closeout artifacts\\n  Verified by the new done-closeout gate helpers in `.githooks/_spec_gate.sh` and by the blocked test case for a dirty `done` change plus additional work.\\n- [pass] The gate message tells the user to commit the completed change first, or explicitly archive/merge it, instead of continuing to stack work\\n  Verified in the `enforce_done_closeout_gate()` failure messages for both single-done and multi-done cases.\\n- [pass] `tests/test-spec-gate.sh` covers at least one blocked case where a `done` change file and additional work are committed together, and one allowed case where the commit is just recording that completed change and its closeout artifacts\\n  Verified by `done_change_with_additional_work_is_blocked()` and `done_change_commit_passes()`.\\n- [pass] The gate blocks multiple dirty `done` changes at once so backlog items cannot be closed out in one bundled commit by accident\\n  Verified by `multiple_done_changes_are_blocked()`.\\n\\nAdditional verification:\\n\\n- [pass] Full hook regression suite still passes\\n  Ran `bash tests/test-spec-gate.sh` successfully after implementing the new gate.\"}","{\"name\":\"scope-aware-commit-gate\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"The current commit gate only checks that an active change file exists in `build|verify|done` status — it doesn't check whether the staged files relate to that change. This lets agents commit unrelated edits that bypass the workflow. We need a lightweight scoping mechanism so the gate can warn or block when staged files don't match the active change's expected scope.\",\"dust\":\"The gate learned to ask what you're here for.\",\"challenges\":\"Bash `[[ == ]]` glob matching lets `*` cross directory boundaries — needed to split dir/filename for correct scoping. Initial test used an exempt file, masking the real behavior.\",\"learnings\":\"The gate doesn't need to be perfect — forcing agents to declare `files:` before editing is the real checkpoint. The mechanical enforcement is a backstop.\",\"outcomes\":\"Commits now require staged files to match an active change's declared scope. 11 regression tests cover all paths.\",\"peer_spec_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: `files:` syntax not defined — multiline YAML won't work with `extract_meta_value`. Need single-line format.\\n2. Blocker: \\\"the active change file\\\" is singular but multiple can coexist — need selection semantics.\\n3. Blocker: no test requirement — hook logic without regression tests is fragile.\\n4. Ambiguous: \\\"simple glob-like patterns\\\" undefined — does `*` match `/`? Are plain paths exact?\\n5. Risk: \\\"warning and blocks\\\" is muddled — just say blocks with exit non-zero.\\n\\n-> Addressed: `files:` is now a single comma-separated line. Multiple changes: any match passes, block only if none match. Tests added as acceptance criterion. Glob semantics: `*` matches within directory only, plain paths exact. Gate prints offending paths and exits non-zero.\",\"peer_code_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: `[[ \\\"$file\\\" == $pattern ]]` lets `*` match `/` — `scripts/*.sh` would match `scripts/sub/x.sh`. Weakens the gate.\\n2. Missing test: multiple active changes case untested.\\n3. Missing tests: blank `files:` line and exempt path under restrictive scope untested.\\n\\n-> Addressed: glob matching now splits dir/filename and matches separately. Added tests for multi-scope match, blank `files:` fallback, and exempt paths under scope. All 11 tests pass.\",\"verify\":\"- [pass] Template includes optional `files:` field on a single line\\n- [pass] `_spec_gate.sh` reads `files:` from active changes and compares staged non-exempt files\\n- [pass] Multiple active changes: a file passes if any change's scope matches (tested)\\n- [pass] Unscoped files print offending paths and exit non-zero (tested)\\n- [pass] Agent can update `files:` before committing — this change uses its own `files:` field\\n- [pass] Empty/absent `files:` falls back to current behavior (tested with both absent and blank)\\n- [pass] Skip-mode unaffected (tested)\\n- [pass] Tests cover: match, mismatch, empty, blank, exempt, multi-change, and skip mode (11 tests total)\"}","{\"name\":\"trim-bootstrap-context\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"FLOW.md is 3,246 tokens — 96% of the bootstrap budget. Review every section for redundancy, verbosity, and over-specification. Trim to hit the 3k bootstrap target without losing any behavioral rules. This is about saying the same things in fewer words, not removing capabilities.\",\"dust\":\"The framework shed its weight and kept its spine.\",\"challenges\":\"First pass cut too aggressively — Codex caught 4 dropped rules. The peer review prompts were the hardest to shorten without losing constraints.\",\"learnings\":\"\\\"Same behavior in fewer words\\\" is harder than it sounds. Every sentence removed needs a check that the behavior it encoded is still stated somewhere.\",\"outcomes\":\"Bootstrap dropped from 3,377 to ~1,640 tokens — 51% reduction. Version bumped to 0.1.0. Human-steered mid-build to also address versioning and guidance conventions.\",\"peer_spec_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: 3k pass/fail not pinned to a measurement method — pin to SOD report output.\\n2. Risk: skip disqualifiers could drift during tightening — preserve them explicitly.\\n3. Risk: peer review constraints could weaken during prompt shortening — preserve meaning.\\n\\n-> Addressed: measurement pinned to SOD output. Skip disqualifiers and review constraints added as explicit preservation requirements.\",\"peer_code_review\":\"**Codex** (2026-04-16):\\n\\n1. Blocker: peer review prompts gutted to \\\"Blockers only\\\" — lost advisory/context constraints.\\n2. Blocker: b-startup.md read changed from conditional to unconditional — behavior change.\\n3. High: \\\"Don't skip the review\\\" instruction dropped.\\n4. High: \\\"Do not auto-delete branches\\\" safety rule removed.\\n\\n-> All four restored.\",\"verify\":\"- [pass] Bootstrap SOD: 1,638 / 3,000 — well under target (was 3,377)\\n- [pass] All behavioral rules preserved: states, gates, review protocol, skip disqualifiers, merge safety, branch protection\\n- [pass] Peer review prompts shortened but retain: limited context, prioritize this change, advisory-unless-blocker, word cap\\n- [pass] Skip disqualifiers preserved: add/delete/rename, multi-file, handful-of-lines, \\\"if unsure it does not qualify\\\"\\n- [pass] Redundant phrasing collapsed — Rules for AI no longer duplicates done-state and skip sections\\n- [pass] b-startup.md unchanged at 131 tokens\"}","{\"name\":\"validate-done-closeout-gate\",\"status\":\"done\",\"ts\":\"2026-04-16T23:26:53Z\",\"what\":\"Validate the new done-closeout workflow rule by recreating the old batching mistake in a disposable test repo and confirming the current hooks block it. This is a workflow-validation change, not a product behavior change: the deliverable is recorded evidence in this change file that the mistake is reproducible and correctly rejected now.\",\"dust\":\"The workflow caught the footprint we left last time.\",\"challenges\":\"The only false start was a shell-variable name collision in `zsh`; once corrected, the fixture behaved exactly as intended.\",\"learnings\":\"The new gate is doing the right thing for the exact mistake we made earlier: multiple completed backlog items left dirty now fail at normal commit time instead of slipping through.\",\"outcomes\":\"Recreated the accidental batch-close shape in an isolated repo and confirmed the hook blocks it with the done-closeout message and exit code `1`.\",\"peer_spec_review\":\"**Claude** (2026-04-16):\\n\\nClear and well-scoped. Main clarifications needed were fixture method and failure handling. This spec now pins the disposable fixture to a temp copied repo with fresh Git history and local hooks, and it says that any validation gap becomes a follow-up fix change rather than an ignored anomaly. No blockers.\",\"peer_code_review\":\"**Claude** (2026-04-16):\\n\\nNo blockers. The validation run section satisfies all four acceptance criteria: disposable fixture method, reproduction of the batching mistake shape, blocked commit with exit code `1`, and repeatable recorded evidence. Advisory only: this validation exercised the multi-`done` path, not the single-`done` plus extra work path, but that path is already covered by the repo-local gate tests.\",\"verify\":\"- [pass] A disposable repo fixture is created from the current workspace so the validation does not disturb the main repo state\\n  Verified by the recorded rsync-to-temp plus fresh `git init` fixture method in `## Validation run`.\\n- [pass] The validation reproduces the old mistake shape: one or more change files reach `status: done`, additional standard work is stacked on top, and a normal commit is attempted\\n  Verified by the disposable repo sequence that staged two dirty `done` change files and attempted a normal commit, matching the accidental batch-close backlog pattern.\\n- [pass] The attempted commit is blocked by the current hook policy with a message attributable to the done-closeout rule\\n  Verified by commit exit code `1` and the recorded hook message beginning `Multiple completed changes are still uncommitted`.\\n- [pass] The validation steps and observed result are recorded in this change file with enough detail to repeat manually\\n  Verified in `## Validation run`, which records the fixture method, numbered steps, exit code, and the exact rejection message.\\n\\nAdditional verification:\\n\\n- [pass] Required post-build peer review completed with no blockers\\n  Claude review is recorded in `## Peer code review`.\"}","{\"name\":\"fix-archive-commit-gate-bypass\",\"status\":\"done\",\"ts\":\"2026-04-17T00:21:50Z\",\"what\":\"Release-time archiving (moving done changes to `.spec/archive/`) required bypassing the commit hooks entirely because the skip gate only allows single-file changes and the spec gate requires an active change file. Archive commits are a legitimate workflow operation — the gate should recognize them, not force a bypass.\",\"dust\":\"The gate learned to let the filing clerk through.\",\"challenges\":\"First implementation bypassed too many gates — Codex caught that archive commits would skip done-closeout entirely. Regex matching was also too loose.\",\"learnings\":\"Gate bypasses should be surgical — exempt the minimum gate, not the whole policy chain. `case` matching is safer than regex for exact path lists.\",\"outcomes\":\"Archive commits no longer need `core.hooksPath=/dev/null`. The gate recognizes them as a legitimate workflow operation while still enforcing SOD freshness and done-closeout discipline.\",\"peer_spec_review\":\"**Codex** (2026-04-17):\\n\\n1. Blocker: allowed artifact set ambiguous — some files are exempt, some aren't. Need exact list.\\n2. High: need true rename detection via git status, not just path prefix matching.\\n3. Medium: test should mirror real release flow, not just path checks.\\n\\n-> Addressed: exact extras listed, rename detection via `--name-status`, test mirrors real flow.\",\"peer_code_review\":\"**Codex** (2026-04-17):\\n\\n1. Blocker: `enforce_commit_policies` early return for archive bypassed done-closeout gate entirely — should only bypass spec gate.\\n2. High: regex dots in path matching — `README.md` matches `READMEXmd`. Use `case` instead.\\n3. Advisory: no test for archive + unrelated dirty work.\\n\\n-> Fixed: archive bypass stays only in `enforce_spec_gate`. Path matching uses `case` via `is_archive_allowed_extra`. Done-closeout and scope gates still run for archive commits.\",\"verify\":\"- [pass] `_spec_gate.sh` recognizes archive-only commits via true rename detection (`R*` status from `.spec/changes/` to `.spec/archive/`) and exact `case` matching for allowed extras\\n- [pass] Archive exemption only applies when all staged files are archive renames + allowed artifacts — mixing with code is blocked (tested)\\n- [pass] Tests cover: archive-only passes, archive mixed with code blocked (17 total tests pass)\\n- [pass] VERSION bumped to 0.1.1\"}","{\"name\":\"fix-sod-viewer-rebuild-loop\",\"status\":\"done\",\"ts\":\"2026-04-17T00:43:39Z\",\"what\":\"`docs/viewer.html` is a generated file, but its changes trigger SOD staleness detection, forcing a double SOD refresh on every commit. Exclude it from the staleness check so the SOD→viewer→commit sequence works in one pass.\",\"dust\":\"The generated file stopped pretending to be authored.\",\"challenges\":\"First test approach called `--check` directly which doesn't test the hook exclusion — the real fix is in the gate, not the script.\",\"learnings\":\"For gate behavior, test the gate function directly rather than the downstream tool it calls.\",\"outcomes\":\"Viewer rebuilds no longer force double SOD refresh. One-line fix, one test.\",\"peer_spec_review\":\"**Codex** (2026-04-17):\\n\\n1. Blocker: `files:` was wrong — scoped to `update-sod-report.sh` but the change is in `_spec_gate.sh`.\\n2. High: no test required — need a regression fixture.\\n3. High: \\\"committable state\\\" criterion too vague — pin to `--check` staying clean.\\n4. Medium: \\\"one line fix\\\" is overconfident.\\n\\n-> Addressed: files corrected, test added as criterion, committable defined via `--check`.\",\"peer_code_review\":\"**Codex** (2026-04-17):\\n\\n1. High: test is white-box (calls `has_sod_relevant_changes` directly) instead of exercising full commit path with `--check`.\\n2. Medium: doesn't prove the full policy interaction — only the helper behavior.\\n\\n-> Accepted as-is: the hook exclusion IS the mechanism. The gate never reaches `--check` for viewer-only changes because `has_sod_relevant_changes` returns false. Testing the helper directly is the right level for this one-line fix.\",\"verify\":\"- [pass] `has_sod_relevant_changes` excludes `docs/viewer.html` — verified by test fixture\\n- [pass] `docs/viewer.html` still counted in SOD report totals — verified in `.spec/sod-report.md`\\n- [pass] 18 tests pass including new viewer staleness test\"}","{\"name\":\"fix-viewer-freshness-and-archive-utc\",\"status\":\"done\",\"ts\":\"2026-04-17T00:51:56Z\",\"what\":\"Tighten the repo surfaces that drifted in the current-state review. The generated viewer should stay current as workflow data changes, archive filenames should carry UTC timestamps so the viewer does not mislabel local time as `Z`, and the docs should describe the actual archive-on-merge behavior instead of implying that a plain merge fully closes the loop. Because this changes shipped workflow behavior, bump the project version, refresh the generated sod outputs, and normalize the live shorthand language to lowercase `sod`.\",\"dust\":\"The generated surfaces finally agree on what time it is.\",\"challenges\":\"the only real friction was keeping generated viewer and sod outputs in sync while the active change file itself was changing during verify\",\"learnings\":\"temp-repo harnesses need to isolate active change files or live repo state leaks into workflow tests\",\"outcomes\":\"viewer freshness is now checked explicitly, archive timestamps are UTC-correct, archive closeout refreshes generated artifacts, the repo version moved to 0.1.2, and the live shorthand is consistently lowercase `sod`\",\"peer_spec_review\":\"**Claude** (2026-04-17, final diff):\\n\\n1. Clarify the viewer-freshness trigger by naming the concrete scripts or the exact enforcement point.\\n2. `archive-done-changes.sh` appears to be the sole archive timestamp call site; `date -u` is the right fix if confirmed.\\n3. Make the viewer freshness check explicit in validation rather than implied.\\n4. State the exact version bump component.\\n5. Specify where repo-local test coverage should live.\\n\\nAddressed:\\n\\n- acceptance criterion 1 now names `scripts/devlog.sh`, `scripts/flowlog.sh`, and the archive/merge path\\n- the validation requirement now explicitly calls for a viewer freshness check\\n- the version bump is pinned to patch release `0.1.2`\\n- the notes now state that the test coverage can extend the existing shell harness or use a focused script\",\"peer_code_review\":\"**Claude** (2026-04-17):\\n\\nVerdict: pass, no blockers.\\n\\n- Viewer freshness is covered: archive closeout now rebuilds and stages viewer + sod outputs, `build-viewer.sh` has `--check`, CI checks viewer freshness explicitly, and `merge-completed-work.sh --auto` checks viewer freshness before proceeding.\\n- UTC timestamps are covered: `archive-done-changes.sh` now uses `date -u`, and the new workflow-script test proves the archived hour comes from UTC rather than local Honolulu time, with retry protection around hour rollover.\\n- README, VERSION, and sod outputs are covered: archive lifecycle wording is clearer, `VERSION` is `0.1.2`, generated outputs are refreshed, and live shorthand references are lowercase `sod`.\\n\\nAdvisory only:\\n\\n- the archive-to-sod/viewer coupling now lives in `archive-done-changes.sh`; that is acceptable because `--require-done` guarantees the archive path when the helper succeeds\\n- the `make_repo` cleanup in the test harness is a good infrastructure fix and prevents live active changes from polluting temp repos\\n- `merge-completed-work.sh` removed the redundant inline sod refresh because `archive-done-changes.sh` now owns it; current call sites remain safe because they require the archive path\",\"verify\":\"- [pass] `scripts/devlog.sh`, `scripts/flowlog.sh`, and the archive/merge path keep `docs/viewer.html` current without requiring a separate manual rebuild, and repo validation checks that the committed viewer is current via an explicit viewer freshness check\\n  Verified by the existing viewer rebuild calls in `scripts/devlog.sh` and `scripts/flowlog.sh`, the new archive-path refresh in `scripts/archive-done-changes.sh`, the delegated archive path in `scripts/merge-completed-work.sh`, and the explicit `bash scripts/build-viewer.sh --check` step in `.github/workflows/validate.yml`.\\n- [pass] Archived change filenames are created in UTC so the viewer's parsed `...Z` timestamps are semantically correct, with repo-local test coverage for the new behavior\\n  Verified by `date -u` in `scripts/archive-done-changes.sh` and by `bash tests/test-workflow-scripts.sh`, which exercises the archive path under `TZ=Pacific/Honolulu` and confirms the archived hour comes from UTC while viewer and sod outputs remain fresh.\\n- [pass] README and merge/archive surfaces describe the actual archive lifecycle clearly, `VERSION` is bumped from `0.1.1` to patch release `0.1.2`, sod outputs are refreshed for the final tree, and live shorthand references use lowercase `sod`\\n  Verified by the lowercase `sod` wording updates in `README.md`, `CODEX.md`, `CLAUDE.md`, `.spec/b-startup.md`, `.githooks/_spec_gate.sh`, `.githooks/pre-commit`, `.github/workflows/validate.yml`, `tests/test-spec-gate.sh`, and the generated labels in `scripts/update-sod-report.sh`, along with the `0.1.2` bump in `VERSION` and passing `bash scripts/build-viewer.sh --check` plus `bash scripts/update-sod-report.sh --check` after the final refresh.\"}","{\"name\":\"publish-dust-on-mochiexists\",\"status\":\"done\",\"ts\":\"2026-04-17T00:56:58Z\",\"what\":\"Capture a durable publishing recommendation for `spec-of-dust` itself. The note should record the public-facing naming decision to present the workflow as `dust` on `mochiexists.com`, recommend changing the Mochi homepage label from `clawpost` to `post`, and cite the public evidence used to identify the Mochi GitHub owner via the live site.\",\"dust\":\"A small name can still carry the whole workflow.\",\"challenges\":\"the only real wrinkle was that `sod` had to be regenerated after staging the new docs file because the report counts tracked files, not unstaged additions\",\"learnings\":\"for docs-only additions in this repo, stage the new tracked file before rerunning `scripts/update-sod-report.sh`\",\"outcomes\":\"the repo now has a dated publishing note recommending `mochiexists.com/dust`, a homepage label change from `clawpost` to `post`, and a public evidence trail for the `mochiexists` GitHub owner\",\"peer_spec_review\":\"**Claude** (2026-04-17):\\n\\nVerdict: no blockers. The change is clear and appropriately scoped as a documentation-only note.\\n\\n- Advisory: include a date in the note so future readers know when the public evidence was gathered\\n- Advisory: `docs/` creation is acceptable if the file does not already exist\\n- Advisory: the prefilled closure section can stay minimal, but it should only be treated as final when the change reaches `done`\",\"peer_code_review\":\"**Claude** (2026-04-17):\\n\\nVerdict: no blockers. The diff is clean and matches the spec.\\n\\n- The docs note covers the `dust` recommendation at `mochiexists.com/dust` while keeping `spec-of-dust` as the repo name\\n- The homepage section lists `clawpost`, `plate`, `story`, and `yolo`, then recommends `clawpost` -> `post`\\n- The evidence trail records `mochiexists.com/yolo` -> `github.com/mochiexists/yolo`\\n- Generated `sod` outputs stayed consistent once the new files were staged before rerunning the report\",\"verify\":\"- [pass] A new docs note records the current recommendation to publish `spec-of-dust` publicly as `dust` at `mochiexists.com/dust` while keeping `spec-of-dust` as the repo/product name\\n  Verified in `docs/publish-dust-on-mochiexists.md` under `Recommendation`.\\n- [pass] The docs note records that the live Mochi homepage currently lists `clawpost`, `plate`, `story`, and `yolo`, and recommends changing the homepage label from `clawpost` to `post`\\n  Verified in `docs/publish-dust-on-mochiexists.md` under `Homepage copy`.\\n- [pass] The docs note records the evidence trail for the public GitHub owner discovery: `https://mochiexists.com/yolo` links to `https://github.com/mochiexists/yolo`, which establishes `mochiexists` as the public GitHub owner even though the local homepage source was not identified in the current workspace\\n  Verified in `docs/publish-dust-on-mochiexists.md` under `Evidence trail` and `Current limitation`.\"}","{\"name\":\"distinguish-advisory-vs-live-delivery\",\"status\":\"done\",\"ts\":\"2026-04-17T01:10:31Z\",\"what\":\"Tighten `spec-of-dust` so requests for live-site or other external updates cannot be treated as complete without verification against the actual target. The workflow should require specs and verify/final reporting to say whether the requested result was only documented locally or actually implemented and checked on the external repo, site, or deployed system.\",\"dust\":\"The map now has to admit when it is not the city.\",\"challenges\":\"the only real work was resisting a broader taxonomy and keeping the fix pointed at external-target verification instead of inventing new workflow ceremony\",\"learnings\":\"the failure mode is social as much as technical; if the final wording is nal-target wording in `verify`.\\n- [pass] `.spec/changes/_template.md` prompts authors to record the intended external target and whether completion means “documented locally” or “implemented and verified on the target,” while keeping that prompt optional for internal-only changes\\n  Verified by the new optional note in `## Notes` and the `Outcomes` wording update from `delivered result` to `actual verified result`.\"}","{\"name\":\"create-language-packs\",\"status\":\"done\",\"ts\":\"2026-04-17T01:39:44Z\",\"what\":\"Build out the release-pack scaffolds for JavaScript/TypeScript, Swift/iOS, Python, Python (ML/research), and Rust. Each pack provides stack-specific gate suggestions, CI examples, and tool configs that layer on top of the base spec-of-dust workflow. These are source material for future release artifacts — concrete enough to copy into a real project, not just planned scope.\",\"dust\":\"Five languages walked into a framework and each found their own gate.\",\"challenges\":\"python-research was the hardest to balance — enough ML-specific guidance to be useful without bloating past the line budget.\",\"learnings\":\"\\\"Self-contained\\\" means one file is enough. Cross-references between packs save lines but break the copy-paste promise.\",\"outcomes\":\"5 language packs with concrete, copy-paste-ready gate configs and CI examples.\",\"peer_spec_review\":\"**Codex** (2026-04-17):\\n\\n1. Blocker: index.json entries need artifact path placeholders.\\n2. Blocker: tool alternatives (vitest/jest, ruff/black) not mechanically verifiable — pick one default.\\n3. Blocker: python-research is overstuffed for 100-line limit.\\n4. Risk: 5 dense packs at once may overbuild the packs surface.\\n5. Advisory: consistent cross-pack template structure.\\n\\n-> Addressed: artifact placeholders added, one default per gate, python-research limit relaxed, consistent structure criterion added.\",\"peer_code_review\":\"**Codex** (2026-04-17):\\n\\n1. Blocker: python-research tep\",\"outcomes\":\"external-target specs can now name the expected Git identity and human-only restrictions, and final reporting must say when a local implementation exists but authorized publishing did not happen\",\"peer_spec_review\":\"**Claude** (2026-04-17):\\n\\nVerdict: no blockers.\\n\\n- tightened criterion 1 so the trigger is concrete instead of subjective\\n- keep the new language aligned with the existing live-target verification rule rather than duplicating it in a conflicting way\\n- template prompt should help authors capture how blocked publish authority affects completion language\",\"peer_code_review\":\"**Claude** (2026-04-17):\\n\\nVerdict: no blockers.\\n\\n- `FLOW.md` now extends the live-target rule with explicit Git identity and publish-restriction language\\n- `FLOW.md` now requires plain reporting when local implementation exists but authorized push/merge/deploy did not happen\\n- `_template.md` now prompts authors to record the expected Git account, author identity, and human-only restriction when relevant\\n- Advisory only: the full picture is spread across `verify`, `done`, and `Rules for the AI`, which matches the existing pattern but adds a little reading cost\",\"verify\":\"- [pass] `.spec/FLOW.md` tells agents to record the expected Git identity for external-target work when the requested outcome depends on a repo, site, or system they may not be authorized to publish to, and to check whether publishing is restricted to a specific account or only the human\\n  Verified by the new Git-identity language in `verify` and `Rules for the AI`.\\n- [pass] `.spec/FLOW.md` tells agents not to describe external work as fully complete when the local implementation exists but push/deploy is blocked by identity, permission, or author restrictions\\n  Verified by the new reporting sentence in `done`.\\n- [pass] `.spec/changes/_template.md` gives authors an optional prompt to note the external target, expected Git identity, and any “only this account” or “human-only” publishing restriction\\n  Verified by the added comment in `## Notes`.\"}"];

    </script>
    <script>
      (() => {
        const app = document.getElementById("app");
        const timeline = document.getElementById("timeline");
        const statsEl = document.getElementById("stats");
        const countEl = document.getElementById("entryCount");
        const emptyState = document.getElementById("emptyState");

        let allEntries = [];
        let currentFilter = "all";

        function inferSource(obj) {
          if ("event" in obj) return "devlog";
          if ("sentiment" in obj) return "flowlog";
          return "unknown";
        }

        function el(tag, attrs, children) {
          const node = document.createElement(tag);
          if (attrs) {
            for (const [k, v] of Object.entries(attrs)) {
              if (k === "className") node.className = v;
              else if (k === "textContent") node.textContent = v;
              else node.setAttribute(k, v);
            }
          }
          if (children) {
            for (const c of children) {
              if (typeof c === "string") node.appendChild(document.createTextNode(c));
              else if (c) node.appendChild(c);
            }
          }
          return node;
        }

        function render() {
          const filtered =
            currentFilter === "all"
              ? allEntries
              : allEntries.filter((e) => e._source === currentFilter);

          if (allEntries.length === 0) {
            app.style.display = "none";
            emptyState.style.display = "";
            return;
          }

          emptyState.style.display = "none";
          app.style.display = "";

          renderStats();

          // Separate active (non-done) changes from the rest
          const activeSection = document.getElementById("activeSection");
          const activeChanges = filtered.filter((e) => e._source === "change" && e.status && e.status !== "done");
          const timelineEntries = filtered.filter((e) => !(e._source === "change" && e.status && e.status !== "done"));

          activeSection.textContent = "";
          if (activeChanges.length > 0 && (currentFilter === "all" || currentFilter === "change")) {
            activeSection.style.display = "";
            const heading = el("div", { className: "entry-change", textContent: "Active Work" });
            heading.style.marginBottom = "8px";
            heading.style.fontSize = "1.1rem";
            heading.style.color = "var(--accent)";
            activeSection.appendChild(heading);
            for (const entry of activeChanges) {
              activeSection.appendChild(buildEntry(entry));
            }
          } else {
            activeSection.style.display = "none";
          }

          countEl.textContent = filtered.length + " shown";
          timeline.textContent = "";
          for (const entry of timelineEntries) {
            timeline.appendChild(buildEntry(entry));
          }
        }

        function renderStats() {
          statsEl.textContent = "";
          const devCount = allEntries.filter((e) => e._source === "devlog").length;
          const flowCount = allEntries.filter((e) => e._source === "flowlog").length;
          const changeCount = allEntries.filter((e) => e._source === "change").length;
          const sentiments = {};
          for (const e of allEntries) {
            if (e.sentiment) sentiments[e.sentiment] = (sentiments[e.sentiment] || 0) + 1;
          }

          statsEl.appendChild(statSpan(allEntries.length, "entries"));
          if (devCount) statsEl.appendChild(statSpan(devCount, "devlog"));
          if (flowCount) statsEl.appendChild(statSpan(flowCount, "flowlog"));
          if (changeCount) statsEl.appendChild(statSpan(changeCount, "changes"));

          for (const [s, n] of Object.entries(sentiments)) {
            const span = document.createElement("span");
            const badge = el("span", { className: "badge " + s, textContent: s });
            span.appendChild(badge);
            span.appendChild(document.createTextNode(" " + n));
            statsEl.appendChild(span);
          }
        }

        function statSpan(value, label) {
          const span = document.createElement("span");
          const valEl = el("span", { className: "stat-value", textContent: String(value) });
          span.appendChild(valEl);
          span.appendChild(document.createTextNode(" " + label));
          return span;
        }

        function buildEntry(entry) {
          if (entry._source === "change") return buildChangeEntry(entry);

          const source = entry._source;
          const article = el("article", { className: "entry " + source });

          // Header
          const header = el("div", { className: "entry-header" });
          header.appendChild(el("span", { className: "entry-ts", textContent: formatTs(entry.ts) }));
          header.appendChild(el("span", { className: "entry-source", textContent: source }));

          if (entry.agent) {
            header.appendChild(el("span", { className: "entry-agent", textContent: entry.agent }));
          }

          if (source === "flowlog" && entry.sentiment) {
            header.appendChild(el("span", { className: "badge " + entry.sentiment, textContent: entry.sentiment }));
          }

          if (source === "devlog" && entry.kind) {
            header.appendChild(el("span", { className: "badge kind", textContent: entry.kind }));
          }

          article.appendChild(header);

          // Change name / summary
          const changeName = entry.change || entry.summary || null;
          if (changeName) {
            article.appendChild(el("div", { className: "entry-change", textContent: changeName }));
          }

          // Fields
          if (source === "devlog") {
            const fields = el("div", { className: "entry-fields" });
            appendField(fields, "event", entry.event);
            appendField(fields, "kind", entry.kind);
            appendField(fields, "summary", entry.summary);
            appendField(fields, "reason", entry.reason);
            appendField(fields, "file", (entry.files || []).join(", ") || null);
            appendField(fields, "command", entry.command);
            appendField(fields, "agent", entry.agent);
            article.appendChild(fields);
          } else if (source === "flowlog") {
            const fields = el("div", { className: "entry-fields" });
            appendField(fields, "change", entry.change);
            appendField(fields, "agent", entry.agent);
            appendField(fields, "sentiment", entry.sentiment);
            article.appendChild(fields);

            const details = document.createElement("details");
            details.className = "entry-details";
            const summary = document.createElement("summary");
            summary.textContent = "feedback details";
            details.appendChild(summary);

            const content = el("div", { className: "detail-content" });
            const detailFields = el("div", { className: "entry-fields" });

            appendField(detailFields, "divergence", entry.flow_divergence);
            appendField(detailFields, "friction", entry.friction);
            appendField(detailFields, "suggestion", entry.suggestion);

            content.appendChild(detailFields);
            details.appendChild(content);
            article.appendChild(details);
          }

          return article;
        }

        function appendField(container, label, value) {
          const isEmpty = !value || value === "nothing notable" || value === "";
          container.appendChild(el("span", { className: "field-label", textContent: label }));
          container.appendChild(el("span", {
            className: isEmpty ? "field-value empty" : "field-value",
            textContent: isEmpty ? "\u2014" : value,
          }));
        }

        function formatTs(ts) {
          if (!ts) return "\u2014";
          try {
            const d = new Date(ts);
            return d.toLocaleDateString("en-US", {
              year: "numeric",
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });
          } catch (_) {
            return ts;
          }
        }

        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            render();
          });
        });

        function buildChangeEntry(entry) {
          const article = el("article", { className: "entry change" });

          const header = el("div", { className: "entry-header" });
          header.appendChild(el("span", { className: "entry-ts", textContent: formatTs(entry.ts) }));
          header.appendChild(el("span", { className: "entry-source", textContent: "change" }));

          const statusCls = "status-badge" + (entry.status === "done" ? " done" : "");
          header.appendChild(el("span", { className: statusCls, textContent: entry.status || "\u2014" }));

          article.appendChild(header);

          if (entry.name) {
            article.appendChild(el("div", { className: "entry-change", textContent: entry.name }));
          }

          if (entry.what) {
            const whatText = entry.what.split("\n\n")[0].replace(/\n/g, " ");
            article.appendChild(el("div", { className: "entry-what", textContent: whatText }));
          }

          // Dust line — the star of the show
          if (entry.dust && entry.dust !== "- Dust:" && entry.dust !== "nothing notable") {
            article.appendChild(el("div", { className: "dust-line", textContent: entry.dust }));
          }

          // Closure fields — inline, not collapsible
          const isReal = (v) => v && !v.startsWith("- ") && v !== "nothing notable";
          const closureFields = [
            ["challenges", entry.challenges],
            ["learnings", entry.learnings],
            ["outcomes", entry.outcomes],
          ].filter(([, v]) => isReal(v));

          if (closureFields.length > 0) {
            const fields = el("div", { className: "entry-fields" });
            for (const [label, value] of closureFields) {
              appendField(fields, label, value);
            }
            article.appendChild(fields);
          }

          // Peer review and verify as collapsible
          const hasReview = entry.peer_spec_review || entry.peer_code_review || entry.verify;
          if (hasReview) {
            const details = document.createElement("details");
            details.className = "entry-details";
            const summary = document.createElement("summary");
            summary.textContent = "reviews & verify";
            details.appendChild(summary);

            const content = el("div", { className: "detail-content" });
            const fields = el("div", { className: "entry-fields" });
            if (entry.peer_spec_review) appendField(fields, "spec review", entry.peer_spec_review);
            if (entry.peer_code_review) appendField(fields, "code review", entry.peer_code_review);
            if (entry.verify) appendField(fields, "verify", entry.verify);
            content.appendChild(fields);
            details.appendChild(content);
            article.appendChild(details);
          }

          return article;
        }

        // Load embedded data on startup
        (() => {
          const sources = [
            [EMBEDDED_DEVLOG, "devlog"],
            [EMBEDDED_FLOWLOG, "flowlog"],
          ];
          for (const [lines, fallbackSource] of sources) {
            for (const line of lines) {
              try {
                const obj = JSON.parse(line);
                obj._source = inferSource(obj);
                allEntries.push(obj);
              } catch (_) {}
            }
          }

          // Load embedded changes
          if (typeof EMBEDDED_CHANGES !== "undefined") {
            for (const line of EMBEDDED_CHANGES) {
              try {
                const obj = JSON.parse(line);
                obj._source = "change";
                allEntries.push(obj);
              } catch (_) {}
            }
          }

          if (allEntries.length > 0) {
            allEntries.sort((a, b) => (b.ts || "").localeCompare(a.ts || ""));
            render();
          }
        })();
      })();
    </script>
