<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spec-of-dust &middot; log viewer</title>
    <style>
      :root {
        --bg: #f4efe6;
        --fg: #1d1a17;
        --muted: #5c544c;
        --line: #cdbfaf;
        --card: #fffaf2;
        --accent: #8c4f2f;
        --smooth: #4a7c59;
        --rough: #b5762a;
        --blocked: #a93e2f;
        --devlog-border: #b8a48e;
        --flowlog-border: var(--accent);
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, #fff7ec 0, transparent 35%),
          linear-gradient(180deg, #f7f1e8 0%, var(--bg) 100%);
        color: var(--fg);
        min-height: 100vh;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 600;
        letter-spacing: 0.02em;
        margin-bottom: 6px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.5;
        margin-bottom: 32px;
      }

      .drop-zone {
        border: 2px dashed var(--line);
        border-radius: 6px;
        padding: 40px 24px;
        text-align: center;
        color: var(--muted);
        font-size: 1rem;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        margin-bottom: 24px;
        position: relative;
      }

      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: var(--accent);
        background: rgba(140, 79, 47, 0.04);
      }

      .drop-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .drop-zone .hint {
        font-size: 0.88rem;
        margin-top: 8px;
        color: var(--muted);
        opacity: 0.7;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .filter-btn {
        font-family: inherit;
        font-size: 0.88rem;
        padding: 6px 14px;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--fg);
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-btn:hover { border-color: var(--accent); }

      .filter-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .entry-count {
        margin-left: auto;
        font-size: 0.85rem;
        color: var(--muted);
        font-style: italic;
      }

      .timeline {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .entry {
        border: 1px solid var(--line);
        background: var(--card);
        padding: 20px 22px;
      }

      .entry.devlog { border-left: 4px solid var(--devlog-border); }
      .entry.flowlog { border-left: 4px solid var(--flowlog-border); }

      .entry-header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .entry-ts {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .entry-source {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 8px;
        border: 1px solid var(--line);
        color: var(--muted);
      }

      .entry-agent {
        font-size: 0.82rem;
        color: var(--accent);
        font-weight: 600;
      }

      .entry-change {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--fg);
        margin-bottom: 6px;
      }

      .badge {
        display: inline-block;
        font-size: 0.75rem;
        font-family: "SF Mono", "Fira Code", monospace;
        padding: 2px 10px;
        border-radius: 3px;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .badge.smooth {
        background: rgba(74, 124, 89, 0.12);
        color: var(--smooth);
        border: 1px solid rgba(74, 124, 89, 0.3);
      }

      .badge.rough {
        background: rgba(181, 118, 42, 0.12);
        color: var(--rough);
        border: 1px solid rgba(181, 118, 42, 0.3);
      }

      .badge.blocked {
        background: rgba(169, 62, 47, 0.12);
        color: var(--blocked);
        border: 1px solid rgba(169, 62, 47, 0.3);
      }

      .badge.kind {
        background: rgba(140, 79, 47, 0.08);
        color: var(--accent);
        border: 1px solid rgba(140, 79, 47, 0.2);
      }

      .entry-fields {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 16px;
        font-size: 0.9rem;
        line-height: 1.5;
        margin-top: 10px;
      }

      .field-label {
        color: var(--muted);
        font-size: 0.82rem;
        text-align: right;
        padding-top: 1px;
      }

      .field-value { word-break: break-word; }
      .field-value.empty { color: var(--line); font-style: italic; }

      details.entry-details summary {
        font-size: 0.85rem;
        color: var(--muted);
        cursor: pointer;
        margin-top: 10px;
        padding: 4px 0;
        user-select: none;
      }

      details.entry-details summary:hover { color: var(--accent); }
      details .detail-content { margin-top: 8px; }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .stats {
        display: flex;
        gap: 20px;
        padding: 14px 20px;
        background: var(--card);
        border: 1px solid var(--line);
        margin-bottom: 24px;
        font-size: 0.88rem;
        color: var(--muted);
        flex-wrap: wrap;
      }

      .stat-value {
        font-weight: 600;
        color: var(--fg);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>log viewer</h1>
      <p class="subtitle">
        Browse workflow logs from spec-of-dust. Drop your
        <code>devlog.jsonl</code> and <code>flowlog.jsonl</code> files below.
      </p>

      <div class="drop-zone" id="dropZone">
        <div>Drop JSONL files here, or click to browse</div>
        <div class="hint">Supports devlog.jsonl and flowlog.jsonl &mdash; load one or both</div>
        <input type="file" id="fileInput" multiple accept=".jsonl,.json" />
      </div>

      <div id="app" style="display:none">
        <div class="stats" id="stats"></div>

        <div class="toolbar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="devlog">Devlog</button>
          <button class="filter-btn" data-filter="flowlog">Flowlog</button>
          <span class="entry-count" id="entryCount"></span>
        </div>

        <div class="timeline" id="timeline"></div>
      </div>

      <div class="empty-state" id="emptyState" style="display:none">
        <p>No entries found in the loaded files.</p>
      </div>
    </main>

    <script>
      (() => {
        const dropZone = document.getElementById("dropZone");
        const fileInput = document.getElementById("fileInput");
        const app = document.getElementById("app");
        const timeline = document.getElementById("timeline");
        const statsEl = document.getElementById("stats");
        const countEl = document.getElementById("entryCount");
        const emptyState = document.getElementById("emptyState");

        let allEntries = [];
        let currentFilter = "all";

        dropZone.addEventListener("dragover", (e) => {
          e.preventDefault();
          dropZone.classList.add("dragover");
        });

        dropZone.addEventListener("dragleave", () => {
          dropZone.classList.remove("dragover");
        });

        dropZone.addEventListener("drop", (e) => {
          e.preventDefault();
          dropZone.classList.remove("dragover");
          handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener("change", (e) => {
          handleFiles(e.target.files);
        });

        function handleFiles(files) {
          allEntries = [];
          let pending = files.length;

          for (const file of files) {
            const reader = new FileReader();
            reader.onload = (evt) => {
              const lines = evt.target.result.split("\n").filter((l) => l.trim());
              for (const line of lines) {
                try {
                  const obj = JSON.parse(line);
                  obj._source = inferSource(obj);
                  allEntries.push(obj);
                } catch (_) {}
              }
              pending--;
              if (pending === 0) {
                allEntries.sort((a, b) => (b.ts || "").localeCompare(a.ts || ""));
                render();
              }
            };
            reader.readAsText(file);
          }
        }

        function inferSource(obj) {
          if ("event" in obj) return "devlog";
          if ("sentiment" in obj) return "flowlog";
          return "unknown";
        }

        function el(tag, attrs, children) {
          const node = document.createElement(tag);
          if (attrs) {
            for (const [k, v] of Object.entries(attrs)) {
              if (k === "className") node.className = v;
              else if (k === "textContent") node.textContent = v;
              else node.setAttribute(k, v);
            }
          }
          if (children) {
            for (const c of children) {
              if (typeof c === "string") node.appendChild(document.createTextNode(c));
              else if (c) node.appendChild(c);
            }
          }
          return node;
        }

        function render() {
          const filtered =
            currentFilter === "all"
              ? allEntries
              : allEntries.filter((e) => e._source === currentFilter);

          if (allEntries.length === 0) {
            app.style.display = "none";
            emptyState.style.display = "";
            dropZone.style.display = "";
            return;
          }

          emptyState.style.display = "none";
          app.style.display = "";
          dropZone.style.display = "";

          renderStats();
          countEl.textContent = filtered.length + " shown";

          timeline.textContent = "";
          for (const entry of filtered) {
            timeline.appendChild(buildEntry(entry));
          }
        }

        function renderStats() {
          statsEl.textContent = "";
          const devCount = allEntries.filter((e) => e._source === "devlog").length;
          const flowCount = allEntries.filter((e) => e._source === "flowlog").length;
          const sentiments = {};
          for (const e of allEntries) {
            if (e.sentiment) sentiments[e.sentiment] = (sentiments[e.sentiment] || 0) + 1;
          }

          statsEl.appendChild(statSpan(allEntries.length, "entries"));
          if (devCount) statsEl.appendChild(statSpan(devCount, "devlog"));
          if (flowCount) statsEl.appendChild(statSpan(flowCount, "flowlog"));

          for (const [s, n] of Object.entries(sentiments)) {
            const span = document.createElement("span");
            const badge = el("span", { className: "badge " + s, textContent: s });
            span.appendChild(badge);
            span.appendChild(document.createTextNode(" " + n));
            statsEl.appendChild(span);
          }
        }

        function statSpan(value, label) {
          const span = document.createElement("span");
          const valEl = el("span", { className: "stat-value", textContent: String(value) });
          span.appendChild(valEl);
          span.appendChild(document.createTextNode(" " + label));
          return span;
        }

        function buildEntry(entry) {
          const source = entry._source;
          const article = el("article", { className: "entry " + source });

          // Header
          const header = el("div", { className: "entry-header" });
          header.appendChild(el("span", { className: "entry-ts", textContent: formatTs(entry.ts) }));
          header.appendChild(el("span", { className: "entry-source", textContent: source }));

          if (entry.agent) {
            header.appendChild(el("span", { className: "entry-agent", textContent: entry.agent }));
          }

          if (source === "flowlog" && entry.sentiment) {
            header.appendChild(el("span", { className: "badge " + entry.sentiment, textContent: entry.sentiment }));
          }

          if (source === "devlog" && entry.kind) {
            header.appendChild(el("span", { className: "badge kind", textContent: entry.kind }));
          }

          article.appendChild(header);

          // Change name / summary
          const changeName = entry.change || entry.summary || null;
          if (changeName) {
            article.appendChild(el("div", { className: "entry-change", textContent: changeName }));
          }

          // Fields
          if (source === "devlog") {
            const fields = el("div", { className: "entry-fields" });
            appendField(fields, "event", entry.event);
            appendField(fields, "kind", entry.kind);
            appendField(fields, "summary", entry.summary);
            appendField(fields, "reason", entry.reason);
            appendField(fields, "file", (entry.files || []).join(", ") || null);
            appendField(fields, "command", entry.command);
            appendField(fields, "agent", entry.agent);
            article.appendChild(fields);
          } else if (source === "flowlog") {
            const fields = el("div", { className: "entry-fields" });
            appendField(fields, "change", entry.change);
            appendField(fields, "agent", entry.agent);
            appendField(fields, "sentiment", entry.sentiment);
            article.appendChild(fields);

            const details = document.createElement("details");
            details.className = "entry-details";
            const summary = document.createElement("summary");
            summary.textContent = "feedback details";
            details.appendChild(summary);

            const content = el("div", { className: "detail-content" });
            const detailFields = el("div", { className: "entry-fields" });

            appendField(detailFields, "divergence", entry.flow_divergence);
            appendField(detailFields, "friction", entry.friction);
            appendField(detailFields, "suggestion", entry.suggestion);

            content.appendChild(detailFields);
            details.appendChild(content);
            article.appendChild(details);
          }

          return article;
        }

        function appendField(container, label, value) {
          const isEmpty = !value || value === "nothing notable" || value === "";
          container.appendChild(el("span", { className: "field-label", textContent: label }));
          container.appendChild(el("span", {
            className: isEmpty ? "field-value empty" : "field-value",
            textContent: isEmpty ? "\u2014" : value,
          }));
        }

        function formatTs(ts) {
          if (!ts) return "\u2014";
          try {
            const d = new Date(ts);
            return d.toLocaleDateString("en-US", {
              year: "numeric",
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });
          } catch (_) {
            return ts;
          }
        }

        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            render();
          });
        });
      })();
    </script>
  </body>
</html>
